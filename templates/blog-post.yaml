conductor: 1.0.0
name: blog-post
description: Research, write, and optimize a blog post.

# Fill these in, then run the conductor.
inputs:
  - topic        # What the post is about
  - audience     # Who it's for (developers, general public, etc.)
  - word_count   # Target length

steps:
  - id: research
    instruction: |
      Research {topic} for an audience of {audience}.
      Find at least 5 credible sources with specific data points.
    gate:
      # Did I actually find enough sources?
      - "At least 5 sources with URLs"
      # Are the sources real, not hallucinated?
      - "Each source includes a specific data point or quote"
    output: research

  - id: outline
    instruction: |
      Turn the research into an outline: a hook, 3–5 sections, and a takeaway.
    requires: [research]
    gate:
      # Does it tell a story, not just list facts?
      - "The outline has a clear narrative arc"
      - "Every section maps to a research source"
    output: outline

  - id: write
    instruction: |
      Write the post from the outline, in a voice that fits {audience}.
      Target roughly {word_count} words.
    requires: [outline]
    gate:
      - "Reads naturally for {audience}, not like a list of facts"
      - "Every claim traces back to a cited source"
      # A real file must exist — this is checked, not judged.
      - check: "test -f blog-post.md"

  - id: edit
    instruction: |
      Tighten the draft: cut filler, fix weak transitions, vary sentence length.
    requires: [write]
    gate:
      - "No filler or repeated points remain"
      - "Spelling and grammar are clean"

  - id: seo-check
    instruction: |
      Add a title tag, meta description, and headings. Work {topic} in naturally.
    requires: [edit]
    gate:
      - "Title and meta description present and within length limits"
      - "{topic} appears in the title, first paragraph, and one heading"
