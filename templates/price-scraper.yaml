conductor: 1.1.0
name: price-scraper
description: Scrape prices from a set of targets, flag outliers, and update the database.

inputs:
  - targets       # The sites/sources to scrape (a list, or where to find it)
  - category      # What kind of product/price we're collecting

steps:
  - id: select-targets
    instruction: |
      Resolve {targets} into a concrete list of sources to scrape for {category}.
    gate:
      - "Each target has a URL and an identifier"
      - name: "Target list saved"
        check: "test -s targets.json"
    output: target_list

  # Scrape and sanity-check each target independently. A failure on one
  # target retries that iteration without affecting the others.
  - id: scrape-each
    type: loop
    over: target_list
    as: target
    steps:
      - id: scrape
        instruction: "Fetch current prices for {target}."
        gate:
          - "At least one price found, each with a source URL"
      - id: validate-prices
        instruction: "Sanity-check {target}'s prices (currency, units, range)."
        gate:
          - "Prices are in the expected currency and units"

  - id: flag-outliers
    instruction: |
      Compare prices across all targets. Flag anything implausible (far above or
      below the median) for human review instead of trusting it blindly.
    requires: [scrape-each]
    gate:
      - "Outliers beyond a sensible threshold are flagged, not auto-accepted"
    output: clean_prices

  - id: update-db
    instruction: |
      Write the validated, non-outlier prices to the database.
    requires: [flag-outliers]
    gate:
      - name: "Update ran"
        check: "test -f .prices-updated"
      - "Flagged outliers were held back from the update"
