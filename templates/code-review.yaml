conductor: 1.0.0
name: code-review
description: Review a pull request — security, style, and a written verdict.

inputs:
  - pr_number    # The pull request to review

steps:
  - id: read-pr
    instruction: |
      Read the full diff for PR #{pr_number}. Summarize what changed and why.
    gate:
      - "Every changed file is accounted for in the summary"
      - "The intent of the PR is stated in one sentence"
    output: summary

  # Decision point: does this PR need a security pass?
  - id: assess-security
    instruction: |
      Decide whether this PR touches auth, secrets, input handling, or anything
      network-facing.
    type: condition
    if_true: security-review     # risky → do the security pass
    if_false: style-check        # safe → skip straight to style

  - id: security-review
    instruction: |
      Audit the changed files against the OWASP top 10. Flag each issue with a
      file:line and a concrete fix.
    gate:
      - "Every changed file reviewed for the OWASP top 10"
      # A hard check: no obvious secrets were committed.
      - name: "No committed secrets"
        check: "! git grep -nE '(api[_-]?key|secret|password)\\s*=\\s*.+' -- ':!*.lock'"
    then: style-check            # rejoin the main flow

  - id: style-check
    instruction: |
      Check the diff against the project's conventions and formatting.
    gate:
      - "Naming and structure match the surrounding code"

  - id: write-review
    instruction: |
      Write the review: a verdict (approve / request changes), grouped findings,
      and the single most important thing to fix first.
    requires: [style-check]
    gate:
      - "The verdict is explicit and justified"
      - check: "test -f review.md"
