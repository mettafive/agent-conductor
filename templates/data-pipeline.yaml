conductor: 1.1.0
name: data-pipeline
description: Extract, validate, transform, load, and verify a dataset.

inputs:
  - source        # Where the raw data comes from (file, API, DB)
  - destination   # Where the cleaned data goes

steps:
  - id: extract
    instruction: |
      Pull the raw data from {source}. List the tables/collections found.
    gate:
      - name: "Raw data landed"
        check: "test -s raw-data.json"
    output: table_list   # the list the loop below iterates over

  - id: validate-raw
    instruction: |
      Check the raw data is shaped as expected before doing any work on it.
    requires: [extract]
    gate:
      - "Row counts and column names match the expected schema"
      - "Any malformed rows are quarantined, not silently dropped"

  # Process each table through the same clean → transform sequence.
  - id: transform-tables
    type: loop
    over: table_list     # from extract's output
    as: table            # each iteration sees {table}
    steps:
      - id: clean
        instruction: "Clean {table}: dedupe, fix types, normalize nulls."
        gate:
          - "No duplicate primary keys remain"
      - id: transform
        instruction: "Apply the business transforms to {table}."
        gate:
          - "Output columns match the destination schema"

  - id: load
    instruction: |
      Load the transformed tables into {destination}.
    requires: [transform-tables]
    gate:
      - name: "Load completed without error"
        check: "test -f .load-complete"

  - id: verify
    instruction: |
      Confirm the load: counts match, no nulls in required columns, spot-checks pass.
    requires: [load]
    gate:
      - "Destination row counts match the transformed source"
      - "Required columns contain no nulls"
