conductor: 2.0.0
name: board-ux-punchlist
description: >
  Make agent-conductor's board deliver its core promise — VISUALIZE the agent flow
  legibly, and let the user press Esc to follow the agent live. Implements the full
  UX punch-list from real usage: reliable Esc→follow, navigator fixes (Finished-runs
  header, dead-check bug, per-run summary), a legible StepDetail, grouped heartbeats
  with a relatedness checker + comments, finish→auto-advance, and earlier "something
  is happening" feedback during quiet setup stages. Every step gates on the board
  still type-checking, so no change lands that breaks the build.

# All work happens in board/ (Vite + React). Hard gate per step: the board type-checks.
# Final step runs the full production build. Soft gates capture the UX judgement.

steps:
  # ── 1 ───────────────────────────────────────────────────────────────────
  - id: baseline
    instruction: |
      Branch off main into cb-ux/<date> so the work is isolated and reviewable.
      Confirm the board builds GREEN before any change (so every later regression is
      attributable): `cd board && npm run build`. Read App.tsx, WorkflowSidebar.tsx,
      StepDetail.tsx, SummaryView.tsx, HeartbeatTimeline/Monitor, lib/view.ts and the
      CLI writer.js so the changes are grounded, not guessed.
    gate:
      - check: "npx conductor-board check baseline"
      - name: "On a cb-ux branch"
        check: "git rev-parse --abbrev-ref HEAD | grep -q '^cb-ux/'"
      - name: "Board builds green at baseline"
        check: "cd board && npm run build >/dev/null 2>&1"

  # ── 2 ── Esc / follow / live  (user points: Esc bug, 'live' broken, follow the agent)
  - id: esc-follow
    instruction: |
      The #1 ask: "I just want to press Esc and follow where the agent is." Make it real.
      (a) Esc from ANY selected step or past run reliably returns to live-follow — and the
          NAVIGATOR stops keeping the clicked row highlighted (the highlight must track the
          live active step, not the stale click). Today backToLive() clears selection but the
          sidebar highlight can stick; verify the keydown path fires (focus/listener deps) and
          that liveHighlight wins after Esc.
      (b) Following surfaces the agent's CURRENT reasoning: the active step's latest heartbeat
          shown prominently (not buried), so "follow" means you see what it's thinking now.
      (c) Make Esc discoverable (a hint in the TopBar / ContextHeader: "Esc — follow live").
    requires: [baseline]
    gate:
      - check: "npx conductor-board check esc-follow"
      - name: "Board type-checks"
        check: "cd board && npx tsc -b >/dev/null 2>&1"
      - "Esc from any selected step/past-run returns to live-follow; the sidebar highlight tracks the live active step, not the stale click"
      - "While following, the active step's latest heartbeat (the agent's current reasoning) is shown prominently"

  # ── 3 ── Navigator / sidebar  (Finished-runs header, dead-check bug, per-run summary entry)
  - id: navigator
    instruction: |
      Fix the navigator (WorkflowSidebar.tsx):
      (a) Rename the "History" section to a clear "Finished runs" headliner that reads as a
          divider before the listed runs at the bottom of the nav.
      (b) Bug: dead/stale checks sometimes render in FINISHED runs — find where past-run gate
          checks are read/rendered (GateList / the frozen snapshot) and stop showing checks that
          never resolved / are stale; a finished run should only show real, settled results.
      (c) Each finished run gets a per-run SUMMARY entry at the bottom of its tree, so one click
          opens the run's summary (wire to the existing SummaryView / RunRecord).
    requires: [baseline]
    gate:
      - check: "npx conductor-board check navigator"
      - name: "Board type-checks"
        check: "cd board && npx tsc -b >/dev/null 2>&1"
      - "Sidebar shows a 'Finished runs' headliner; finished runs show only settled checks (no dead/stale ones); each finished run links to its summary"

  # ── 4 ── Visualize the steps  (StepDetail unclear; thin steps feel empty; the whole point)
  - id: step-visualization
    instruction: |
      The product's reason to exist is visualizing the agent flow — and StepDetail ("I never
      understood what it did") and thin steps (setup-branch/pick-batch felt empty) miss it.
      (a) Make StepDetail legible at a glance: a plain one-line "what this step is doing / did",
          then the commands/gates that ran (with pass/fail), the handoff, and the reasoning
          timeline — so a non-author instantly gets it. Reduce jargon (output/requires chips
          explained or de-emphasised).
      (b) Thin steps still feel ALIVE: when a step has little gate machinery, its heartbeats are
          the content — surface them as the primary body so setup/pick never look empty.
    requires: [baseline]
    gate:
      - check: "npx conductor-board check step-visualization"
      - name: "Board type-checks"
        check: "cd board && npx tsc -b >/dev/null 2>&1"
      - "A first-time viewer can read a StepDetail and understand what the step did without asking; thin steps surface their heartbeat activity so they never look empty"

  # ── 5 ── Heartbeat grouping  (relatedness checker, always-an-update, comments, growing chart)
  - id: heartbeats
    instruction: |
      Heartbeats are the agent's narration — group them so there's ALWAYS a coherent "current
      activity", and let the user annotate them.
      (a) Relatedness grouping: cluster consecutive heartbeats that belong to the same action
          (a lightweight checker — "is this beat related to the previous?" via step/iteration +
          insight-type + text similarity). Render the timeline as collapsible groups with a
          group headline, so the view always has a meaningful latest-group at top.
      (b) Per-beat / per-group COMMENTS: the user can write a note on a beat/group; persist it
          (status.json or a sidecar the CLI/server can read) and show it inline.
      (c) A growing per-run activity chart (MVP): a compact strip of grouped activity over the
          run's timeline. Keep it incremental — ship the grouping + comments first.
      Touch both sides: board/src (HeartbeatTimeline + types + a grouping lib) and, if comments
      need persistence, board/server + board/cli/writer.js.
    requires: [step-visualization]
    gate:
      - check: "npx conductor-board check heartbeats"
      - name: "Board type-checks"
        check: "cd board && npx tsc -b >/dev/null 2>&1"
      - "Heartbeats render as related groups with an always-current group headline; the user can comment on a beat/group and the comment persists + shows inline"

  # ── 6 ── Finish → auto-advance + per-run summary  (board moves to next; user-friendly summary)
  - id: finish-and-summary
    instruction: |
      (a) When a step (or iteration) finishes, the board should PROMPT itself to the next active
          step automatically — the live view advances so the user keeps following without
          clicking. (Builds on liveFollow/followStep; make finish nudge the follow target.)
      (b) After each run, a user-friendly SUMMARY of the heartbeats + insights — readable prose,
          not raw logs — shown at the bottom of the navigator per run (and as the run's main
          SummaryView). Synthesize the grouped heartbeats + knowledge/insights into "what
          happened + what we learned".
    requires: [heartbeats]
    gate:
      - check: "npx conductor-board check finish-and-summary"
      - name: "Board type-checks"
        check: "cd board && npx tsc -b >/dev/null 2>&1"
      - "On finish the live view advances to the next active step on its own; each run has a readable heartbeat+insight summary reachable from the navigator"

  # ── 7 ── Earlier feedback  (setup is slow/quiet; ensure the user things are happening)
  - id: early-feedback
    instruction: |
      Setup/pre-run stages felt dead ("not much happened"). Make the board reassure earlier:
      (a) Light up the moment the agent starts — surface the very first activity (board started,
          conductor copied, status-init, the first heartbeat) instead of a static "waiting"
          screen, so the user sees momentum in the first seconds.
      (b) During quiet steps (setup-branch/pick-batch/pre-runs), keep a visible "currently:
          <latest heartbeat>" pulse so there's always a sign of life.
      This pairs with the conductor-authoring guidance (thin steps should still heartbeat often)
      — note that in CONDUCTOR.md / the spec docs so skill authors heartbeat early stages.
    requires: [esc-follow, navigator]
    gate:
      - check: "npx conductor-board check early-feedback"
      - name: "Board type-checks"
        check: "cd board && npx tsc -b >/dev/null 2>&1"
      - "From agent start the board shows momentum within seconds; quiet steps always show a visible 'currently…' pulse from the latest heartbeat"

  # ── 8 ── Ship  (full build, commit, push)
  - id: ship
    instruction: |
      Full production build must pass (`cd board && npm run build`). Update CONDUCTOR.md / docs
      for any new behaviour (Esc hint, comments, grouped heartbeats). Commit on the cb-ux branch
      and push it for review. Note whether a version bump + publish is warranted (do NOT publish
      without the user's go).
    requires: [esc-follow, navigator, step-visualization, heartbeats, finish-and-summary, early-feedback]
    gate:
      - check: "npx conductor-board check ship"
      - name: "Full production build passes"
        check: "cd board && npm run build >/dev/null 2>&1"
      - name: "Branch pushed"
        check: "git rev-parse --abbrev-ref --symbolic-full-name @{u} >/dev/null 2>&1"
