conductor: 1.0.0
name: basic-report
description: A simple linear research report — research, outline, write, review.

# The smallest useful pattern: four steps, a gate on each, no branching.
inputs:
  - topic
  - audience

steps:
  - id: research
    instruction: |
      Research {topic} for an audience of {audience}.
      Gather credible, recent sources and capture the key facts and tensions.
    gate:
      - "At least 5 credible sources collected"
      - "Each source has a URL and a one-line takeaway"
      - "Sources are recent or clearly still authoritative"
    output: sources

  - id: outline
    instruction: |
      Using {sources}, draft a structured outline for the report:
      an intro, 3–5 body sections, and a conclusion.
    requires: [research]
    gate:
      - "Outline has a clear narrative arc, not just a list of facts"
      - "Every body section maps to at least one source"
    output: outline

  - id: write
    instruction: |
      Write the full report from {outline}, citing {sources} inline.
      Match the tone to the {audience}.
    requires: [outline]
    gate:
      - "Report is at least 800 words"
      - "Every claim traces back to a cited source"
      - "No placeholder text (TODO, [insert], lorem ipsum) remains"
      - check: "test -f report.md"
    output: draft

  - id: review
    instruction: |
      Critically review {draft}. Fix weak transitions, unsupported claims,
      and anything that reads like filler. Produce the final report.
    requires: [write]
    gate:
      - "Every section earns its place — no padding"
      - "Reads naturally end to end, appropriate for {audience}"
      - "Spelling and grammar are clean"
