conductor: 2.0.0
name: daily-price
description: >
  Scrape each clinic's prices, validate them, and write the day's snapshot. A
  real-world loop: one gated sub-sequence per clinic, a failed clinic retries on
  its own without touching the others.

# Showcases: a loop over a prior output, the board-sync first gate (§8.1), and a
# summary step that rejoins after the loop.
inputs:
  - region

steps:
  - id: pick-clinics
    instruction: |
      List the active clinics in {region} that have a public website. For each,
      capture {name, url, id}. This is the loop input.
    gate:
      - check: "npx conductor-board check pick-clinics"   # board-sync, runs first
      - "Every clinic has a name and a reachable URL"
    output: clinics

  - id: scrape-and-price
    type: loop
    over: clinics
    as: clinic
    requires: [pick-clinics]
    steps:
      - id: find-prices
        instruction: |
          Find {clinic}'s price page — try the sitemap first, then the nav — and
          extract the treatment prices verbatim with currency.
        gate:
          - check: "npx conductor-board check scrape-and-price"
          - "Prices extracted verbatim, each with a currency"
      - id: validate-prices
        instruction: Sanity-check {clinic}'s prices — no zeros, plausible ranges.
        gate:
          - "No zero or wildly implausible prices"
      - id: write-snapshot
        instruction: Append {clinic}'s prices to today's snapshot.
        gate:
          - check: "test -d snapshots"

  - id: summarize
    instruction: Roll the per-clinic snapshots into the day's report, flagging anomalies.
    requires: [scrape-and-price]
    gate:
      - "Report covers every clinic and flags any anomalies"
      - check: "test -d reports"
