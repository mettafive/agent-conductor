conductor: 2.0.0
name: treatment-page
description: >
  A branching SEO page builder. Researches a veterinary treatment, then branches
  on whether pet insurance is relevant before writing and SEO-checking the page.

# Showcases: type: condition, if_true / if_false, and `then` rejoin points.
inputs:
  - treatment
  - animal

steps:
  - id: research
    instruction: |
      Research the {treatment} for {animal}: what it is, when it's needed,
      typical cost ranges, and what pet owners worry about.
    gate:
      - "Covers what, when, cost, and owner concerns"
      - "At least 4 authoritative veterinary sources"
    output: research

  - id: insurance-relevant
    instruction: |
      Decide whether pet insurance meaningfully affects how an owner approaches
      {treatment}. True if it's expensive, elective-adjacent, or commonly claimed.
    type: condition
    if_true: compare-insurers
    if_false: write-page

  - id: compare-insurers
    instruction: |
      Compare how the major pet insurers cover {treatment} for {animal}:
      what's included, typical excess, and any waiting periods.
    gate:
      - "At least 3 insurers compared on coverage and cost"
      - "Clearly states what is and isn't typically covered"
    output: insurance_table
    then: write-page          # rejoin the main flow here

  - id: write-page
    instruction: |
      Write the {treatment} page for {animal} owners using {research}.
      If an {insurance_table} exists, weave it in as a dedicated section.
    gate:
      - "Page answers the owner's top 3 questions in the first screen"
      - "Reads for a worried pet owner, not a vet textbook"
      - "No placeholder text remains"
      - check: "test -f treatment-page.html"
    output: page

  - id: seo-check
    instruction: |
      Audit {page} for SEO: title tag, meta description, heading hierarchy,
      internal links, and the target keyword '{treatment} {animal}'.
    requires: [write-page]
    gate:
      - "Title tag and meta description present and under length limits"
      - "Exactly one H1; logical H2/H3 hierarchy"
      - "Target keyword appears in title, first paragraph, and one heading"
      - name: "HTML validates"
        check: "npx --yes html-validate treatment-page.html"
