conductor: 2.0.0
name: content-pipeline
description: >
  Polish a batch of pages through a gated loop, then hold them all at a human
  approval gate before anything ships. Shows type: loop and type: approval
  working together.

# Showcases: a loop (process N pages) feeding a human approval step with
# per-item decisions, branching to ship or revise.
inputs:
  - batch

steps:
  - id: claim-pages
    instruction: |
      Claim the next {batch} pages in order and scaffold a proposal for each.
      Output the list as page_list.
    gate:
      - check: "npx conductor-board check claim-pages"
      - "page_list is the next pages in order, not hand-picked"
    output: page_list

  - id: polish
    type: loop
    over: page_list
    as: page
    requires: [claim-pages]
    steps:
      - id: polish-page
        instruction: Polish {page} to the bar and write the result into its proposal.
        gate:
          - check: "npx conductor-board check polish"
          - "Reads naturally; no placeholder text remains"
      - id: check-links
        instruction: Verify every link on {page} resolves (HTTP 200) and is animal-correct.
        gate:
          - "No dead or mis-targeted links"

  - id: approve-batch
    type: approval
    instruction: |
      Review the polished pages before any of them go live. Approve the ones that
      are ready; reject any that need another pass.
    requires: [polish]
    approval:
      prompt: "Ship these pages to production?"
      items:
        - "{page} — ready to ship"
      actions:
        approve: ship
        reject: revise

  - id: ship
    instruction: Ship the approved pages live and request indexing.
    requires: [approve-batch]
    gate:
      - "Each shipped page is live and indexed"
      - check: "test -d out"

  - id: revise
    instruction: Take the rejected pages back through another polish pass.
    gate:
      - "Every rejected page has been addressed"
