conductor: 1.0.0
name: conductor-board-bootstrap
description: Set up the board, convert a skill into a gated workflow, and execute it.

# auto_improve (default: true) — runs the Phase 0 self-improvement pass before
# step 1: proven knowledge is applied silently, structural changes ask for
# approval. Set to false to disable it entirely (no improvement cards, simpler
# board). The agent reads knowledge as context either way.
auto_improve: true

inputs:
  - skill_content

steps:
  - id: preflight
    instruction: |
      Verify the environment can run conductor-board.
      Check that Node.js 18+ and npx are available.
    gate:
      - name: "Node.js installed"
        check: "node --version"
      - name: "npx available"
        check: "npx --version"

  - id: start-board
    instruction: |
      Start the board server ONCE in the background and leave it running for the
      whole run. It opens the browser automatically — do NOT pass --headless here,
      that defeats the live view (--headless is only for CI / no-display runs).
        npx conductor-board >/tmp/conductor-board.log 2>&1 &
      Wait ~3 seconds for it to initialize. It auto-detects a free port if 3042
      is taken and records the chosen port in .conductor/server.json. Do NOT run
      this command again later — one board per run. Re-running just reuses the
      live server, but repeatedly launching is how you end up with stray tabs.
    requires: [preflight]
    gate:
      - name: "Server config file exists"
        check: "test -f .conductor/server.json"
      - name: "Server responds to health check"
        check: "curl -sf http://localhost:$(node -p \"require('./.conductor/server.json').port\")/health -o /dev/null"

  - id: read-skill
    instruction: |
      Read and analyze the user's skill content:

      {skill_content}

      Break it down into:
      - **EVERY distinct, user-recognizable work-unit the skill names — this is the master list.**
        Go phase by phase and write down each one the user would scan the board for: "keyword
        research", "SEO polish", "add diagrams", "checksum", "calibration frames", "prove truth".
        **A work-unit is a candidate step whether or not it needs a gate** — flag each as
        `gateable` (has a real must-pass condition) or `divider` (visibility-only: the user wants
        to SEE it happened, but there's no hard check). The convert step must give EACH its own
        visual step/sub-step; a `divider` becomes a gate-less or soft-attested step, never folded
        into a sibling's prose. **The #1 failure is folding a named phase (a real SEO/keyword/polish
        pass) into another step's instructions so it never gets a card — the user then thinks it was
        skipped. List it as its own work-unit now so that can't happen.**
      - the discrete sequential steps and decision points where the flow could branch;
      - **repeated operations that run a procedure ONCE PER ITEM over a list — these BECOME
        `type: loop` steps, so name the LIST and the PER-ITEM sub-steps explicitly** (e.g. "for each
        clinic: research → keyword-research → write → SEO-polish → save → ship" — note the dividers
        are their own sub-steps); and which checks are verifiable by a shell command vs which need
        judgment.
      Flag every loop candidate AND every divider work-unit loudly — the convert step must turn each
      loop into a loop (never a flat step) and each named work-unit into its own card (never folded).
      Save your analysis to .conductor/skill-analysis.md. It MUST contain a machine-readable
      WORK-UNIT LEDGER — one line per named work-unit, in EXACTLY this format, under a
      `## work-units` heading (this is what `conductor-board coverage` checks the conductor against,
      so the id you write here MUST become the step/sub-step id in the conductor):

        ## work-units
        - id: buy-dataforseo-recon   kind: divider
        - id: claim-batch            kind: gateable
        - id: polish-page            kind: gateable   loop: per-page
        - id: index-submit           kind: divider

      `kind: gateable` = has a real must-pass condition; `kind: divider` = visibility-only (the user
      wants to SEE it happened, no hard check). Put the PAID/EXTERNAL recon (DataForSEO, an API buy,
      a crawl) on its own line — that is the line most often folded away. Prose above the ledger is
      fine; the ledger lines are the contract.
    requires: [start-board]
    gate:
      - name: "Analysis saved"
        check: "test -f .conductor/skill-analysis.md"
      - name: "Work-unit ledger present (machine-readable, ≥1 `- id: … kind: …` line)"
        check: "grep -qE '^- id:[[:space:]]*[A-Za-z0-9].*kind:[[:space:]]*(gateable|divider)' .conductor/skill-analysis.md"
      - "The analysis lists EVERY distinct work-unit the skill names (not just the gateable ones) in the `## work-units` ledger, each tagged gateable|divider — so the convert step can give each its own card. I did not let any named phase (e.g. an SEO/keyword/polish pass, a paid recon) survive only as a sentence inside another work-unit"

  - id: convert-to-conductor
    instruction: |
      Convert the analysis into a conductor YAML. This is where the run's whole value is
      won or lost on TWO orthogonal axes: VISIBILITY (every named work-unit gets a card) and
      GATE QUALITY (each gate actually fails bad work). Author to BOTH bars in CONDUCTOR.md —
      "What makes a (visual) step" AND "What makes a good gate". The skill is the benchmark. Rules:
      - **GRANULAR VISIBILITY IS THE DEFAULT — surface every named work-unit as its own step
        ("What makes a (visual) step" / the "substep divider").** Walk the read-skill work-unit list
        and give EACH entry its own visual step/sub-step — *whether or not it needs a gate*. A
        `divider` work-unit (visibility-only: "keyword research", "SEO polish", "add diagrams",
        "checksum", "calibration frames", "prove truth") becomes its OWN gate-less or soft-attested
        card — the board-sync `check:` is enough; do NOT invent a hard check just to justify it
        (that's over-gating), and NEVER fold it into a sibling step's instruction prose. The
        motivating failure: an SEO/keyword pass folded into research-clinic/write-fields got no card
        and the user thought it was skipped. The board must read as a COMPLETE STORY — if the user
        named it, it is a step. (Still surface *named phases*, not mechanical micro-actions like
        "save"/"format" — those stay inside a card; spec §2.0.)
      - every step gets at least one gate criterion (for a pure divider, the board-sync `check:`
        alone is a legitimate, complete gate — visibility, not gating); conditions (type: condition)
        where the flow branches; chain data with output:/requires:.
      - **LOOPS — the board's whole visual payoff, so this is NON-NEGOTIABLE.** Any work the
        skill does ONCE PER ITEM over a list — "for each page / clinic / file…", "claim N and
        process each", "repeat for every X", any batch (read-skill already flagged these as
        "repeated operations") — MUST be a `type: loop` over that list, with the per-item
        procedure as its `steps:` sub-steps. NEVER a single flat step the agent hand-walks.
        Shape:
            - id: <name>
              type: loop
              over: <list variable>     # e.g. clinic_list  (set by an earlier step's output:)
              as: <item>                # e.g. clinic
              steps:                     # the PER-ITEM sub-steps, EACH with its own gate(s)
                - id: <sub-1>
                  …
        The board renders a loop as a kanban with ONE CARD PER ITEM — that per-item story is the
        entire reason the tool exists. Flattening a batch into one step is the #1 way to destroy
        the visualization. Rule of thumb: if the analysis names a list AND a procedure run on each
        member, it IS a loop — author it as one.
      - Hard gates (check:) for anything verifiable by command; soft gates only for genuine
        judgment. Make hard gates check SUBSTANCE not surface, and cross-validate a step's
        outputs against each other and against real data (DB, live web) — never in isolation.
      - **NO SELF-ATTESTATION (CONDUCTOR.md principle #9 — the #1 way a "grounded" gate is still
        vacuous).** A gate must never pass by reading a value the agent wrote ABOUT ITS OWN WORK
        (`testsPass: true`, `rollbackProven: true`, `liveHealth: "green"`, a `recomputed` figure the
        agent placed beside its own claim). The agent would just write the passing word. For every
        hard gate apply the litmus: *could the agent make this pass by changing a word in its own
        output, without changing the actual work?* If yes, move the source of truth to an
        INDEPENDENT observation the gate makes itself — re-run the suite and read the exit code,
        apply the fix and build, dry-run the restore, recompute the stat from the raw rows, probe
        the live endpoint. (Recomputing from *different parts of the output that must agree* —
        line-items vs their stated total — is fine; that's internal consistency, not self-grading.)
      - **Author every gate from the domain-independent skeleton (CONDUCTOR.md), so the logic
        generalizes to skills you don't know** (tarot, heraldry, perfume, birdsong): "`<what the
        agent produced>` is consistent with `<an independent reference the skill names>` under
        `<the skill's own rule>`." NAME the reference and the rule from the skill itself — if you
        can't, you haven't grasped the intent yet. An exotic domain is NOT an excuse for a soft
        "looks plausible" gate; it means the reference is a lookup table (canonical meanings, IFRA
        limits, the regional species list, the tincture classes) the discover/grounding step loads
        FIRST, exactly as daily-enrichment loads the clinic's crawled price evidence before any
        price gate runs.
      - Name each gate after the skill step/goal it enforces, so the human can see which
        requirement each gate guards (traceability).
      Then RED-TEAM every hard gate (CONDUCTOR.md principle #6): write ONE known-BAD example
      it must reject, run the gate's check against that example, and confirm it FAILS. A gate
      you haven't watched fail on a bad example does not count — fix it until it reds.
      Save the conductor to .conductor/conductor.yaml, and save a human-readable
      .conductor/gate-review.md listing, per step: the skill goal it enforces, what the gate
      rejects, and the red-team result (the bad example + confirmation the gate failed it).
    requires: [read-skill]
    gate:
      - name: "Conductor file created"
        check: "test -f .conductor/conductor.yaml"
      - name: "Conductor passes validation"
        check: "npx conductor-board validate .conductor/conductor.yaml"
      - name: "COVERAGE: every work-unit in the ledger has a card (independent check — no folded phase)"
        check: "npx conductor-board coverage --analysis .conductor/skill-analysis.md --conductor .conductor/conductor.yaml"
      - name: "Gate-review written (gates traced to skill goals + red-teamed)"
        check: "test -f .conductor/gate-review.md"
      - "Every hard gate was run against a known-bad example and FAILED it — a gate that can't reject its own violation is a lint, not a gate"
      - "NO self-attestation: for each hard gate I applied the litmus 'could the agent pass this by changing a word in its OWN output without changing the work?' — every gate's source of truth is an independent observation (re-run/build/probe/recompute) or a named external reference loaded into the grounding bundle, never a self-reported boolean the agent wrote about its own result"
      - "Generalization check: each gate names the independent reference + the skill's own rule it enforces (the domain-independent skeleton); no gate fell back to a soft 'looks plausible' merely because the domain was unfamiliar"
      - "Every per-item-over-a-list operation in the skill-analysis became a `type: loop` (with the per-item procedure as its sub-steps) — NOT a flattened single step. The board's per-item kanban is the whole point; I checked the analysis's repeated operations against the conductor and each is a loop"
      - "VISUAL-STEP COVERAGE: every distinct work-unit in the read-skill list (gateable AND divider) has its OWN step/sub-step in the conductor. I walked the work-unit list against the steps and confirmed NONE was folded into another step's instruction prose — including the visibility-only dividers (SEO/keyword/polish/checksum-style phases). A divider with only a board-sync `check:` (or a soft attestation) is CORRECT and complete — I did not over-gate it, and I did not hide it. The board reads as a complete story of the work the user named"

  - id: confirm-gates
    type: approval
    instruction: |
      Before ANY work runs, the user confirms the gates faithfully capture their skill —
      this is the one checkpoint that guarantees the gates match intent. Present
      .conductor/gate-review.md as an approval card: for each step, the skill goal, the gate
      that guards it, and the red-team proof it rejects violations. Mark this step
      awaiting_approval (gate pending_human) with an `approval` object whose items are the
      gates (one per step/gate), then WAIT for the human's Approve/Reject on the board.
      On reject: read the feedback, fix the flagged gate(s) in .conductor/conductor.yaml
      (re-validate, re-red-team, update gate-review.md), and re-present. Do NOT start
      execution until the gate set is approved — nothing after this point is skippable.
    requires: [convert-to-conductor]
    approval:
      prompt: >
        These gates are how your skill gets enforced on every run — each one is traced to a
        skill goal and red-teamed against a known-bad example (see .conductor/gate-review.md).
        Approve to start the run, or reject to have a gate fixed before anything executes.
      actions:
        approve: execute-workflow
        reject: convert-to-conductor

  - id: execute-workflow
    instruction: |
      Execute the generated conductor workflow.
      Initialize the board with: conductor-board status-init .conductor/conductor.yaml
      This also auto-injects a Phase 0 "improvement" pass — if the conductor's
      knowledge section holds any PROVEN this-conductor insights with current/
      proposed text, apply each (rewrite the named step), then validate, before
      step 1. Structural changes (add/remove/reorder a step) wait for human
      Approve on the board. If nothing is proven, Phase 0 is empty — start the work.
      Set the top-level "goal" from the conductor's description, and refresh
      "current_step_goal" each time current_step changes.
      Walk each step in order, updating status.json after EVERY transition
      (pending -> running -> gate checking -> passed/failed -> done). The human is
      watching the board to follow along — never do real work without updating the
      board first. Doing work the board doesn't reflect ("freeballing") is not
      allowed: if you drift, stop, re-sync the board, restart the step cleanly, and
      apologize. The board shows a red "Freeballing?" banner after ~3 minutes
      without a heartbeat. Retry on gate failure — never skip.
      At least once per minute, append a heartbeat {at, note} to the current
      step's heartbeat array (read prior entries first; orient against the gate
      AND the goal; use [text](url) links for any PRs or pages you produce).
      Before marking each step done, append a finalBeat — {at, note, finalBeat:
      true, handoff: {to, context, produced}} — summarizing the step and handing
      off to the next; read the previous step's finalBeat before you start one.
      For loop steps, update "completed" and the "iterations" object as EACH
      iteration finishes — don't wait until the loop ends.
      At the START of the run, read .conductor/insights.md (if it exists) to carry
      forward what past runs learned — don't repeat insights already recorded there.
      At run end, before setting status "done", write what you learned into the
      conductor's knowledge section — the conductor IS the knowledge base. Use:
        conductor-board suggest "title" --scope <scope> [--step S --current X --proposed Y]
      --scope is REQUIRED (this-conductor | upstream | template | tooling | corpus).
      A repeat sighting escalates emerging -> proven (3x); proven this-conductor
      insights auto-apply in the next run's Phase 0. Browse them on the board's
      ✨ Insights page. Set the top-level status to "done" when the last step
      completes.
    requires: [confirm-gates]
    gate:
      - name: "Status file exists"
        check: "test -f .conductor/status.json"
      - name: "Workflow completed successfully"
        check: "node -p \"JSON.parse(require('fs').readFileSync('.conductor/status.json','utf8')).status\" | grep done"
      - name: "Captured cross-cutting learnings (≥1 insight, ≥2 scopes)"
        check: "npx conductor-board knowledge --min 1 --min-scopes 2"
      - "Answered: what did I learn that does NOT fit a step of this workflow? (upstream, template, tooling, or corpus insights logged with scope tags)"
