conductor: 1.0.0
name: code-review
description: >
  A gates-heavy PR review. Reads a diff, branches on security exposure, then runs
  strict coverage and style gates before writing the review. Hard checks throughout.

# Showcases: multiple conditions, mixed soft + hard gates, executable `check`s.
inputs:
  - pr_number

steps:
  - id: read-pr
    instruction: |
      Read the full diff for PR #{pr_number}. Summarize intent, surface area,
      and the riskiest changed files.
    gate:
      - "Every changed file accounted for in the summary"
      - "Intent of the PR stated in one sentence"
      - check: "git diff --quiet HEAD~1 HEAD; test $? -ne 0"   # there IS a diff
    output: diff_summary

  - id: touches-security
    instruction: |
      Decide whether this PR touches authentication, authorization, secrets,
      input handling, or anything network-facing.
    type: condition
    if_true: security-audit
    if_false: coverage-check

  - id: security-audit
    instruction: |
      Audit the changed files against the OWASP top 10. Flag injection,
      auth bypass, leaked secrets, and unsafe deserialization with file:line.
    gate:
      - "Every changed file reviewed for the OWASP top 10"
      - "Each finding has a file:line and a concrete fix"
      - name: "No secrets committed"
        check: "! git grep -nE '(api[_-]?key|secret|password)\\s*=\\s*.+' -- ':!*.lock'"
    then: coverage-check        # rejoin main flow

  - id: coverage-check
    instruction: |
      Verify the PR includes tests for its new behavior and that the suite passes.
    gate:
      - "New or changed logic has corresponding tests"
      - name: "Test suite passes"
        check: "npm test"
      - name: "Coverage threshold met"
        check: "npm run coverage -- --silent"

  - id: style-check
    instruction: |
      Check the diff against the project's style and conventions.
    requires: [coverage-check]
    gate:
      - "Naming and structure match the surrounding code"
      - name: "Lint clean"
        check: "eslint . --max-warnings 0"
      - name: "Types check"
        check: "tsc --noEmit"

  - id: write-review
    instruction: |
      Write the review for PR #{pr_number}: a verdict (approve / request changes),
      grouped findings, and the single most important thing to fix first.
    requires: [style-check]
    gate:
      - "Verdict is explicit and justified"
      - "Findings grouped by severity, each actionable"
      - "Names the one highest-leverage fix"
      - check: "test -f review.md"
