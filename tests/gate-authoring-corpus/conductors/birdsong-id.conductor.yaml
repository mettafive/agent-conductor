conductor: 2.0.0
name: birdsong-id
description: >
  Identify the species in each recording; ID is plausible for the region/season and cites acoustic features.

steps:
  - id: load-recordings
    instruction: |
      Load recordings with their location/date + extracted acoustic features, and the regional species list
      (what's plausible here, this season) into the grounding bundle.
    output: recordings
    gate:
      - check: "npx conductor-board check load-recordings"
      - name: "Features + regional list captured"
        check: "node verify.mjs id-in-region --out fixtures/birdsong-id/birdsong-id.out.json --ground fixtures/birdsong-id/birdsong-id.ground.json"

  - id: birdsong-id-loop
    type: loop
    over: recordings
    as: recording
    requires: [load-recordings]
    steps:
      - id: id-recording
        instruction: |
          Identify the species in <recording>.
        gate:
          - check: "npx conductor-board check id-recording"
          - name: "Identified species is plausible for the region+season"
            check: "node verify.mjs id-in-region --out fixtures/birdsong-id/<item>.out.json --ground fixtures/birdsong-id/<item>.ground.json"
          - name: "ID cites acoustic features actually in the recording"
            check: "node verify.mjs id-grounded --out fixtures/birdsong-id/<item>.out.json --ground fixtures/birdsong-id/<item>.ground.json"
          - "Confusion species are ruled out by feature, not ignored."

  - id: birdsong-id-finish
    instruction: |
      Confirm every recording IDed, in-region + feature-grounded.
    requires: [birdsong-id-loop]
    gate:
      - check: "npx conductor-board check birdsong-id-finish"
      - name: "All recordings IDed"
        check: "node verify.mjs coverage-complete --out fixtures/birdsong-id/birdsong-id.out.json --ground fixtures/birdsong-id/birdsong-id.ground.json"
