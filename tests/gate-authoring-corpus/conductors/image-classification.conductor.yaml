conductor: 2.0.0
name: image-classification
description: >
  Assign each image a valid class with confidence; class is one the model supports.

steps:
  - id: load-images
    instruction: |
      Load the images + the allowed class taxonomy into the grounding bundle.
    output: images
    gate:
      - check: "npx conductor-board check load-images"
      - name: "Images + taxonomy loaded"
        check: "node verify.mjs class-valid --out fixtures/image-classification/image-classification.out.json --ground fixtures/image-classification/image-classification.ground.json"

  - id: image-classification-loop
    type: loop
    over: images
    as: image
    requires: [load-images]
    steps:
      - id: classify-image
        instruction: |
          Classify <image>.
        gate:
          - check: "npx conductor-board check classify-image"
          - name: "Class is in the allowed taxonomy"
            check: "node verify.mjs class-valid --out fixtures/image-classification/<item>.out.json --ground fixtures/image-classification/<item>.ground.json"
          - name: "Confidence is a valid probability in [0,1]"
            check: "node verify.mjs conf-valid --out fixtures/image-classification/<item>.out.json --ground fixtures/image-classification/<item>.ground.json"
          - "Low-confidence images were flagged for review rather than force-labeled."

  - id: image-classification-finish
    instruction: |
      Confirm every image classified with a valid class+confidence.
    requires: [image-classification-loop]
    gate:
      - check: "npx conductor-board check image-classification-finish"
      - name: "All images classified"
        check: "node verify.mjs coverage-complete --out fixtures/image-classification/image-classification.out.json --ground fixtures/image-classification/image-classification.ground.json"
