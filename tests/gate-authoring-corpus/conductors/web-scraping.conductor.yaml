conductor: 2.0.0
name: web-scraping
description: >
  Extract structured records from each page; fields match what the live page actually shows.

steps:
  - id: list-pages
    instruction: |
      List target pages and fetch each page's raw HTML into the grounding bundle (the truth the
      extracted fields are checked against).
    output: pages
    gate:
      - check: "npx conductor-board check list-pages"
      - name: "Raw HTML captured per page"
        check: "node verify.mjs fields-on-page --out fixtures/web-scraping/web-scraping.out.json --ground fixtures/web-scraping/web-scraping.ground.json"

  - id: web-scraping-loop
    type: loop
    over: pages
    as: page
    requires: [list-pages]
    steps:
      - id: extract-page
        instruction: |
          Extract structured fields from <page>.
        gate:
          - check: "npx conductor-board check extract-page"
          - name: "Every extracted value appears in the page HTML"
            check: "node verify.mjs fields-on-page --out fixtures/web-scraping/<item>.out.json --ground fixtures/web-scraping/<item>.ground.json"
          - "No record on the page was missed and none is a duplicate of pagination/boilerplate."

  - id: web-scraping-finish
    instruction: |
      Confirm every page scraped, fields grounded in HTML.
    requires: [web-scraping-loop]
    gate:
      - check: "npx conductor-board check web-scraping-finish"
      - name: "All pages covered"
        check: "node verify.mjs coverage-complete --out fixtures/web-scraping/web-scraping.out.json --ground fixtures/web-scraping/web-scraping.ground.json"
