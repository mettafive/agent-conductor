conductor: 2.0.0
name: perfume-blend
description: >
  Formulate each blend so notes are balanced, IFRA limits respected, and percentages sum to 100.

steps:
  - id: load-ingredients
    instruction: |
      Load the ingredient table (each with its IFRA max % and note class: top/heart/base) into the grounding bundle.
    output: blends
    gate:
      - check: "npx conductor-board check load-ingredients"
      - name: "Ingredient table + limits captured"
        check: "node verify.mjs pct-sums --out fixtures/perfume-blend/perfume-blend.out.json --ground fixtures/perfume-blend/perfume-blend.ground.json"

  - id: perfume-blend-loop
    type: loop
    over: blends
    as: blend
    requires: [load-ingredients]
    steps:
      - id: formulate-blend
        instruction: |
          Formulate <blend>.
        gate:
          - check: "npx conductor-board check formulate-blend"
          - name: "Ingredient percentages sum to 100"
            check: "node verify.mjs pct-sums --out fixtures/perfume-blend/<item>.out.json --ground fixtures/perfume-blend/<item>.ground.json"
          - name: "No ingredient exceeds its IFRA limit"
            check: "node verify.mjs ifra-respected --out fixtures/perfume-blend/<item>.out.json --ground fixtures/perfume-blend/<item>.ground.json"
          - "Top/heart/base proportions give a coherent evolution, not all-base or all-top."

  - id: perfume-blend-finish
    instruction: |
      Confirm every blend sums + IFRA-compliant.
    requires: [perfume-blend-loop]
    gate:
      - check: "npx conductor-board check perfume-blend-finish"
      - name: "All blends formulated"
        check: "node verify.mjs coverage-complete --out fixtures/perfume-blend/perfume-blend.out.json --ground fixtures/perfume-blend/perfume-blend.ground.json"
