conductor: 2.0.0
name: deploy-pipeline
description: >
  Ship the build to prod only if health checks pass and rollback is proven.

steps:
  - id: record-baseline
    instruction: |
      Record the current prod version + a passing health snapshot into the grounding bundle.
    gate:
      - check: "npx conductor-board check record-baseline"
      - name: "Rollback target recorded"
        check: "node verify.mjs rollback-ready --out fixtures/deploy-pipeline/deploy-pipeline.out.json --ground fixtures/deploy-pipeline/deploy-pipeline.ground.json"
  - id: deploy
    instruction: |
      Deploy the new build and verify health.
    requires: [record-baseline]
    gate:
      - check: "npx conductor-board check deploy"
      - name: "Post-deploy health checks pass on the LIVE endpoint"
        check: "node verify.mjs health-green --out fixtures/deploy-pipeline/deploy-pipeline.out.json --ground fixtures/deploy-pipeline/deploy-pipeline.ground.json"
      - name: "Rollback path is proven (can restore prior version)"
        check: "node verify.mjs rollback-ready --out fixtures/deploy-pipeline/deploy-pipeline.out.json --ground fixtures/deploy-pipeline/deploy-pipeline.ground.json"
      - "Key user-facing flows (not just /health) respond correctly post-deploy."
