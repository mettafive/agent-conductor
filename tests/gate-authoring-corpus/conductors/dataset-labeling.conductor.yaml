conductor: 2.0.0
name: dataset-labeling
description: >
  Label each item per the rubric; labels are valid and inter-consistent with the rubric.

steps:
  - id: load-rubric
    instruction: |
      Load the labeling rubric (allowed label set + criteria) and the items into the grounding bundle.
    output: items
    gate:
      - check: "npx conductor-board check load-rubric"
      - name: "Rubric + items loaded"
        check: "node verify.mjs label-valid --out fixtures/dataset-labeling/dataset-labeling.out.json --ground fixtures/dataset-labeling/dataset-labeling.ground.json"

  - id: dataset-labeling-loop
    type: loop
    over: items
    as: item
    requires: [load-rubric]
    steps:
      - id: label-item
        instruction: |
          Label <item>.
        gate:
          - check: "npx conductor-board check label-item"
          - name: "Label is in the rubric's allowed set"
            check: "node verify.mjs label-valid --out fixtures/dataset-labeling/<item>.out.json --ground fixtures/dataset-labeling/<item>.ground.json"
          - name: "Label justification matches rubric criteria for that label"
            check: "node verify.mjs label-grounded --out fixtures/dataset-labeling/<item>.out.json --ground fixtures/dataset-labeling/<item>.ground.json"
          - "Borderline items are labeled consistently with similar items (no rubric drift across the batch)."

  - id: dataset-labeling-finish
    instruction: |
      Confirm every item labeled with a valid, grounded label.
    requires: [dataset-labeling-loop]
    gate:
      - check: "npx conductor-board check dataset-labeling-finish"
      - name: "All items labeled"
        check: "node verify.mjs coverage-complete --out fixtures/dataset-labeling/dataset-labeling.out.json --ground fixtures/dataset-labeling/dataset-labeling.ground.json"
