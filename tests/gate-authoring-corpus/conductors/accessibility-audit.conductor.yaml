conductor: 2.0.0
name: accessibility-audit
description: >
  Flag real a11y violations per WCAG on each view; each cites a DOM node.

steps:
  - id: render-views
    instruction: |
      Render each view; capture its DOM snapshot into the grounding bundle.
    output: views
    gate:
      - check: "npx conductor-board check render-views"
      - name: "DOM snapshots captured"
        check: "node verify.mjs violation-on-dom --out fixtures/accessibility-audit/accessibility-audit.out.json --ground fixtures/accessibility-audit/accessibility-audit.ground.json"

  - id: accessibility-audit-loop
    type: loop
    over: views
    as: view
    requires: [render-views]
    steps:
      - id: audit-view
        instruction: |
          Audit <view> for WCAG violations.
        gate:
          - check: "npx conductor-board check audit-view"
          - name: "Each violation cites a node that exists in the DOM"
            check: "node verify.mjs violation-on-dom --out fixtures/accessibility-audit/<item>.out.json --ground fixtures/accessibility-audit/<item>.ground.json"
          - "Real blockers (focus traps, contrast) are caught, not just trivially-automatable rules."

  - id: accessibility-audit-finish
    instruction: |
      Confirm every view audited against its DOM.
    requires: [accessibility-audit-loop]
    gate:
      - check: "npx conductor-board check accessibility-audit-finish"
      - name: "All views audited"
        check: "node verify.mjs coverage-complete --out fixtures/accessibility-audit/accessibility-audit.out.json --ground fixtures/accessibility-audit/accessibility-audit.ground.json"
