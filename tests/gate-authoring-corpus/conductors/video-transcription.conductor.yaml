conductor: 2.0.0
name: video-transcription
description: >
  Transcribe each clip; transcript aligns to audio and timestamps are monotonic.

steps:
  - id: load-clips
    instruction: |
      Load each clip's audio reference + duration into the grounding bundle.
    output: clips
    gate:
      - check: "npx conductor-board check load-clips"
      - name: "Audio refs + durations captured"
        check: "node verify.mjs ts-monotonic --out fixtures/video-transcription/video-transcription.out.json --ground fixtures/video-transcription/video-transcription.ground.json"

  - id: video-transcription-loop
    type: loop
    over: clips
    as: clip
    requires: [load-clips]
    steps:
      - id: transcribe-clip
        instruction: |
          Transcribe <clip>.
        gate:
          - check: "npx conductor-board check transcribe-clip"
          - name: "Timestamps are monotonic and within clip duration"
            check: "node verify.mjs ts-monotonic --out fixtures/video-transcription/<item>.out.json --ground fixtures/video-transcription/<item>.ground.json"
          - "Speaker turns + audible words captured, not paraphrased or hallucinated over silence."

  - id: video-transcription-finish
    instruction: |
      Confirm every clip transcribed + aligned.
    requires: [video-transcription-loop]
    gate:
      - check: "npx conductor-board check video-transcription-finish"
      - name: "All clips transcribed"
        check: "node verify.mjs coverage-complete --out fixtures/video-transcription/video-transcription.out.json --ground fixtures/video-transcription/video-transcription.ground.json"
