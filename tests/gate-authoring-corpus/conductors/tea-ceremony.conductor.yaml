conductor: 2.0.0
name: tea-ceremony
description: >
  Produce a ceremony checklist where every step is in canonical order and uses utensils appropriate to the chosen style.

steps:
  - id: load-style
    instruction: |
      Load the canonical procedure + utensil set for the chosen ceremony style into the grounding bundle.
    gate:
      - check: "npx conductor-board check load-style"
      - name: "Canonical procedure captured"
        check: "node verify.mjs order-canonical --out fixtures/tea-ceremony/tea-ceremony.out.json --ground fixtures/tea-ceremony/tea-ceremony.ground.json"
  - id: build-checklist
    instruction: |
      Build the ceremony checklist.
    requires: [load-style]
    gate:
      - check: "npx conductor-board check build-checklist"
      - name: "Steps follow the canonical order"
        check: "node verify.mjs order-canonical --out fixtures/tea-ceremony/tea-ceremony.out.json --ground fixtures/tea-ceremony/tea-ceremony.ground.json"
      - name: "Every utensil named is appropriate to the style"
        check: "node verify.mjs utensil-valid --out fixtures/tea-ceremony/tea-ceremony.out.json --ground fixtures/tea-ceremony/tea-ceremony.ground.json"
      - "Timing/temperature cues are practical for a real practitioner, not just step names."
