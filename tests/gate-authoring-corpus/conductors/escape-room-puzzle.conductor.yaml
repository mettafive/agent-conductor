conductor: 2.0.0
name: escape-room-puzzle
description: >
  Design each puzzle so it is solvable from provided clues alone, has exactly one solution, and chains to the next.

steps:
  - id: plan-puzzles
    instruction: |
      Plan the puzzle chain; for each puzzle capture its provided clue set + intended solution into the grounding bundle.
    output: puzzles
    gate:
      - check: "npx conductor-board check plan-puzzles"
      - name: "Clue sets + solutions captured"
        check: "node verify.mjs solvable-from-clues --out fixtures/escape-room-puzzle/escape-room-puzzle.out.json --ground fixtures/escape-room-puzzle/escape-room-puzzle.ground.json"

  - id: escape-room-puzzle-loop
    type: loop
    over: puzzles
    as: puzzle
    requires: [plan-puzzles]
    steps:
      - id: design-puzzle
        instruction: |
          Design <puzzle>.
        gate:
          - check: "npx conductor-board check design-puzzle"
          - name: "Puzzle is solvable from its provided clues alone"
            check: "node verify.mjs solvable-from-clues --out fixtures/escape-room-puzzle/<item>.out.json --ground fixtures/escape-room-puzzle/<item>.ground.json"
          - name: "Exactly one solution (no ambiguity)"
            check: "node verify.mjs unique-solution --out fixtures/escape-room-puzzle/<item>.out.json --ground fixtures/escape-room-puzzle/<item>.ground.json"
          - "Difficulty fits its place in the chain, and its output feeds the next puzzle cleanly."

  - id: escape-room-puzzle-finish
    instruction: |
      Confirm every puzzle solvable, unique, chained.
    requires: [escape-room-puzzle-loop]
    gate:
      - check: "npx conductor-board check escape-room-puzzle-finish"
      - name: "All puzzles designed"
        check: "node verify.mjs coverage-complete --out fixtures/escape-room-puzzle/escape-room-puzzle.out.json --ground fixtures/escape-room-puzzle/escape-room-puzzle.ground.json"
