conductor: 2.0.0
name: ticket-deduplication
description: >
  Merge each duplicate ticket cluster; merged tickets are genuinely the same issue.

steps:
  - id: cluster-tickets
    instruction: |
      Group candidate duplicate tickets into clusters; capture each ticket's text into the grounding bundle.
    output: clusters
    gate:
      - check: "npx conductor-board check cluster-tickets"
      - name: "Ticket texts captured per cluster"
        check: "node verify.mjs merge-justified --out fixtures/ticket-deduplication/ticket-deduplication.out.json --ground fixtures/ticket-deduplication/ticket-deduplication.ground.json"

  - id: ticket-deduplication-loop
    type: loop
    over: clusters
    as: cluster
    requires: [cluster-tickets]
    steps:
      - id: merge-cluster
        instruction: |
          Decide and merge <cluster>.
        gate:
          - check: "npx conductor-board check merge-cluster"
          - name: "Merged tickets share the actual same issue"
            check: "node verify.mjs merge-justified --out fixtures/ticket-deduplication/<item>.out.json --ground fixtures/ticket-deduplication/<item>.ground.json"
          - "No distinct-but-similar tickets were merged; the surviving ticket keeps all linked context."

  - id: ticket-deduplication-finish
    instruction: |
      Confirm every cluster resolved with justified merges.
    requires: [ticket-deduplication-loop]
    gate:
      - check: "npx conductor-board check ticket-deduplication-finish"
      - name: "All clusters handled"
        check: "node verify.mjs coverage-complete --out fixtures/ticket-deduplication/ticket-deduplication.out.json --ground fixtures/ticket-deduplication/ticket-deduplication.ground.json"
