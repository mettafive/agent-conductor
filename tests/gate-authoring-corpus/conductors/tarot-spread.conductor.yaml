conductor: 2.0.0
name: tarot-spread
description: >
  Generate a spread reading where each position's meaning matches the drawn card's canonical meaning AND the position's defined role.

steps:
  - id: define-spread
    instruction: |
      Load the spread layout (each position + its role, e.g. 'past', 'obstacle') and the canonical
      card-meaning reference into the grounding bundle, and draw a card per position.
    output: positions
    gate:
      - check: "npx conductor-board check define-spread"
      - name: "Layout + meanings + draws captured"
        check: "node verify.mjs meaning-grounded --out fixtures/tarot-spread/tarot-spread.out.json --ground fixtures/tarot-spread/tarot-spread.ground.json"

  - id: tarot-spread-loop
    type: loop
    over: positions
    as: position
    requires: [define-spread]
    steps:
      - id: interpret-position
        instruction: |
          Interpret <position>.
        gate:
          - check: "npx conductor-board check interpret-position"
          - name: "Interpretation matches the drawn card's canonical meaning"
            check: "node verify.mjs meaning-grounded --out fixtures/tarot-spread/<item>.out.json --ground fixtures/tarot-spread/<item>.ground.json"
          - name: "Interpretation addresses this position's defined role"
            check: "node verify.mjs role-addressed --out fixtures/tarot-spread/<item>.out.json --ground fixtures/tarot-spread/<item>.ground.json"
          - "Positions connect into one narrative arc, not 5 disconnected card descriptions."

  - id: tarot-spread-finish
    instruction: |
      Confirm every position interpreted, grounded + role-tied.
    requires: [tarot-spread-loop]
    gate:
      - check: "npx conductor-board check tarot-spread-finish"
      - name: "All positions read"
        check: "node verify.mjs coverage-complete --out fixtures/tarot-spread/tarot-spread.out.json --ground fixtures/tarot-spread/tarot-spread.ground.json"
