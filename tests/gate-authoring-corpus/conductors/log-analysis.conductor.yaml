conductor: 2.0.0
name: log-analysis
description: >
  Identify the root-cause incident from logs; every claim cites a real log line.

steps:
  - id: ingest-logs
    instruction: |
      Ingest the raw logs into the grounding bundle (every line addressable).
    gate:
      - check: "npx conductor-board check ingest-logs"
      - name: "Raw logs captured"
        check: "node verify.mjs claims-cite-logs --out fixtures/log-analysis/log-analysis.out.json --ground fixtures/log-analysis/log-analysis.ground.json"
  - id: diagnose
    instruction: |
      Write the root-cause analysis.
    requires: [ingest-logs]
    gate:
      - check: "npx conductor-board check diagnose"
      - name: "Every claim cites a log line that actually exists"
        check: "node verify.mjs claims-cite-logs --out fixtures/log-analysis/log-analysis.out.json --ground fixtures/log-analysis/log-analysis.ground.json"
      - "The causal chain is the most likely explanation given the evidence, not the first plausible one."
