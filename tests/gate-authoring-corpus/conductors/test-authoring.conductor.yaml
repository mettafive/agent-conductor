conductor: 2.0.0
name: test-authoring
description: >
  Write tests that actually exercise the target code and fail when it regresses.

steps:
  - id: pick-targets
    instruction: |
      Pick the functions/modules to test; snapshot each target's signature + a known-good baseline into
      the grounding bundle.
    output: targets
    gate:
      - check: "npx conductor-board check pick-targets"
      - name: "Targets + baseline captured"
        check: "node verify.mjs test-meaningful --out fixtures/test-authoring/test-authoring.out.json --ground fixtures/test-authoring/test-authoring.ground.json"

  - id: test-authoring-loop
    type: loop
    over: targets
    as: target
    requires: [pick-targets]
    steps:
      - id: write-test
        instruction: |
          Write tests for <target>.
        gate:
          - check: "npx conductor-board check write-test"
          - name: "Test fails when the target is broken (catches regression)"
            check: "node verify.mjs test-meaningful --out fixtures/test-authoring/<item>.out.json --ground fixtures/test-authoring/<item>.ground.json"
          - name: "Test actually executes the target code"
            check: "node verify.mjs covers-target --out fixtures/test-authoring/<item>.out.json --ground fixtures/test-authoring/<item>.ground.json"
          - "Cases cover the real edge conditions (empty, boundary, error path), not just the happy path."

  - id: test-authoring-finish
    instruction: |
      Confirm each target has a regression-catching test.
    requires: [test-authoring-loop]
    gate:
      - check: "npx conductor-board check test-authoring-finish"
      - name: "All targets covered"
        check: "node verify.mjs coverage-complete --out fixtures/test-authoring/test-authoring.out.json --ground fixtures/test-authoring/test-authoring.ground.json"
