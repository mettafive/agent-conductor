conductor: 2.0.0
name: fantasy-trade-eval
description: >
  Evaluate each proposed trade for fairness using real player projections + league scoring rules.

steps:
  - id: load-league
    instruction: |
      Load the player projection table + the league's scoring settings (PPR? categories?) into the grounding bundle,
      and collect the proposed trades.
    output: trades
    gate:
      - check: "npx conductor-board check load-league"
      - name: "Projections + scoring rules captured"
        check: "node verify.mjs value-grounded --out fixtures/fantasy-trade-eval/fantasy-trade-eval.out.json --ground fixtures/fantasy-trade-eval/fantasy-trade-eval.ground.json"

  - id: fantasy-trade-eval-loop
    type: loop
    over: trades
    as: trade
    requires: [load-league]
    steps:
      - id: eval-trade
        instruction: |
          Evaluate <trade>.
        gate:
          - check: "npx conductor-board check eval-trade"
          - name: "Each side's value uses real projections under the league's scoring"
            check: "node verify.mjs value-grounded --out fixtures/fantasy-trade-eval/<item>.out.json --ground fixtures/fantasy-trade-eval/<item>.ground.json"
          - name: "Fairness verdict is consistent with the computed value gap"
            check: "node verify.mjs verdict-consistent --out fixtures/fantasy-trade-eval/<item>.out.json --ground fixtures/fantasy-trade-eval/<item>.ground.json"
          - "Positional scarcity, bye weeks, and roster fit are weighed, not just raw point totals."

  - id: fantasy-trade-eval-finish
    instruction: |
      Confirm every trade evaluated under real rules.
    requires: [fantasy-trade-eval-loop]
    gate:
      - check: "npx conductor-board check fantasy-trade-eval-finish"
      - name: "All trades evaluated"
        check: "node verify.mjs coverage-complete --out fixtures/fantasy-trade-eval/fantasy-trade-eval.out.json --ground fixtures/fantasy-trade-eval/fantasy-trade-eval.ground.json"
