conductor: 2.0.0
name: batch-api-sync
description: >
  Sync each record to the remote API so remote state equals local intent, idempotently.

steps:
  - id: load-records
    instruction: |
      Load the records to sync. For each, snapshot the local DESIRED payload into the grounding bundle —
      the target remote state to verify against after the push.
    output: records
    gate:
      - check: "npx conductor-board check load-records"
      - name: "Desired payload captured per record"
        check: "node verify.mjs remote-matches --out fixtures/batch-api-sync/batch-api-sync.out.json --ground fixtures/batch-api-sync/batch-api-sync.ground.json"

  - id: batch-api-sync-loop
    type: loop
    over: records
    as: record
    requires: [load-records]
    steps:
      - id: sync-record
        instruction: |
          Push <record> to the remote API.
        gate:
          - check: "npx conductor-board check sync-record"
          - name: "Remote read-back equals desired payload"
            check: "node verify.mjs remote-matches --out fixtures/batch-api-sync/<item>.out.json --ground fixtures/batch-api-sync/<item>.ground.json"
          - name: "Re-running is idempotent (no duplicate created)"
            check: "node verify.mjs idempotent --out fixtures/batch-api-sync/<item>.out.json --ground fixtures/batch-api-sync/<item>.ground.json"
          - "No partial/torn write: every field of the record reached the remote, not just the first few before a rate-limit."

  - id: batch-api-sync-finish
    instruction: |
      Confirm remote state matches local intent for all records.
    requires: [batch-api-sync-loop]
    gate:
      - check: "npx conductor-board check batch-api-sync-finish"
      - name: "All records reconciled"
        check: "node verify.mjs coverage-complete --out fixtures/batch-api-sync/batch-api-sync.out.json --ground fixtures/batch-api-sync/batch-api-sync.ground.json"
