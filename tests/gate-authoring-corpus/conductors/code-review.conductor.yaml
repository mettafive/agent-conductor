conductor: 2.0.0
name: code-review
description: >
  Find real defects in each changed file; every finding has a line + concrete fix that compiles.

steps:
  - id: collect-diff
    instruction: |
      List changed files from the diff; capture each file's actual changed-line ranges into the grounding
      bundle so findings can be checked to land on real changed lines.
    output: changed_files
    gate:
      - check: "npx conductor-board check collect-diff"
      - name: "Real changed-line ranges captured per file"
        check: "node verify.mjs lines-in-diff --out fixtures/code-review/code-review.out.json --ground fixtures/code-review/code-review.ground.json"

  - id: code-review-loop
    type: loop
    over: changed_files
    as: file
    requires: [collect-diff]
    steps:
      - id: review-file
        instruction: |
          Review <file> for real defects.
        gate:
          - check: "npx conductor-board check review-file"
          - name: "Each finding cites a line that is actually in the diff"
            check: "node verify.mjs lines-in-diff --out fixtures/code-review/<item>.out.json --ground fixtures/code-review/<item>.ground.json"
          - name: "Each proposed fix compiles / typechecks"
            check: "node verify.mjs fix-compiles --out fixtures/code-review/<item>.out.json --ground fixtures/code-review/<item>.ground.json"
          - "Findings are genuine defects (not style nits dressed as bugs); no real defect in the changed lines was missed."

  - id: code-review-finish
    instruction: |
      Roll findings into one review with an overall verdict.
    requires: [code-review-loop]
    gate:
      - check: "npx conductor-board check code-review-finish"
      - name: "Every changed file reviewed"
        check: "node verify.mjs coverage-complete --out fixtures/code-review/code-review.out.json --ground fixtures/code-review/code-review.ground.json"
