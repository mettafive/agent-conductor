conductor: 2.0.0
name: changelog-generation
description: >
  Generate a changelog where every entry maps to a real merged commit/PR.

steps:
  - id: collect-commits
    instruction: |
      Collect the merged commits/PRs in range into the grounding bundle.
    gate:
      - check: "npx conductor-board check collect-commits"
      - name: "Commit range captured"
        check: "node verify.mjs entry-maps-commit --out fixtures/changelog-generation/changelog-generation.out.json --ground fixtures/changelog-generation/changelog-generation.ground.json"
  - id: write-changelog
    instruction: |
      Write the changelog.
    requires: [collect-commits]
    gate:
      - check: "npx conductor-board check write-changelog"
      - name: "Every entry maps to a real commit/PR"
        check: "node verify.mjs entry-maps-commit --out fixtures/changelog-generation/changelog-generation.out.json --ground fixtures/changelog-generation/changelog-generation.ground.json"
      - "Entries are grouped and worded for users, not raw commit subjects."
