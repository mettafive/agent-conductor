conductor: 2.0.0
name: data-cleaning
description: >
  Clean a dataset: no nulls in required cols, dedup, valid types; row provenance kept.

steps:
  - id: load-raw
    instruction: |
      Load the raw dataset + its schema into the grounding bundle.
    gate:
      - check: "npx conductor-board check load-raw"
      - name: "Raw dataset + schema captured"
        check: "node verify.mjs clean-valid --out fixtures/data-cleaning/data-cleaning.out.json --ground fixtures/data-cleaning/data-cleaning.ground.json"
  - id: clean
    instruction: |
      Clean the dataset.
    requires: [load-raw]
    gate:
      - check: "npx conductor-board check clean"
      - name: "No nulls remain in required columns + types valid"
        check: "node verify.mjs clean-valid --out fixtures/data-cleaning/data-cleaning.out.json --ground fixtures/data-cleaning/data-cleaning.ground.json"
      - name: "No legitimate rows silently dropped (provenance)"
        check: "node verify.mjs no-row-loss --out fixtures/data-cleaning/data-cleaning.out.json --ground fixtures/data-cleaning/data-cleaning.ground.json"
      - "Outlier/imputation choices are defensible, not silently lossy."
