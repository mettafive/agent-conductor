conductor: 2.0.0
name: seo-audit
description: >
  Audit each page against SEO rules; findings reflect the page's real HTML/meta.

steps:
  - id: crawl-pages
    instruction: |
      Crawl the pages; capture each page's real title/meta/headings into the grounding bundle.
    output: pages
    gate:
      - check: "npx conductor-board check crawl-pages"
      - name: "Page meta captured"
        check: "node verify.mjs finding-on-page --out fixtures/seo-audit/seo-audit.out.json --ground fixtures/seo-audit/seo-audit.ground.json"

  - id: seo-audit-loop
    type: loop
    over: pages
    as: page
    requires: [crawl-pages]
    steps:
      - id: audit-page
        instruction: |
          Audit <page> against the SEO rules.
        gate:
          - check: "npx conductor-board check audit-page"
          - name: "Each finding reflects the page's real meta"
            check: "node verify.mjs finding-on-page --out fixtures/seo-audit/<item>.out.json --ground fixtures/seo-audit/<item>.ground.json"
          - "Recommendations are prioritized by real impact, not a flat checklist dump."

  - id: seo-audit-finish
    instruction: |
      Confirm every page audited against real meta.
    requires: [seo-audit-loop]
    gate:
      - check: "npx conductor-board check seo-audit-finish"
      - name: "All pages audited"
        check: "node verify.mjs coverage-complete --out fixtures/seo-audit/seo-audit.out.json --ground fixtures/seo-audit/seo-audit.ground.json"
