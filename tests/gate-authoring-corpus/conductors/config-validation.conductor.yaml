conductor: 2.0.0
name: config-validation
description: >
  Validate each config file against schema + cross-file references resolve.

steps:
  - id: load-configs
    instruction: |
      Load the config files + the schema + the referenceable target set into the grounding bundle.
    output: configs
    gate:
      - check: "npx conductor-board check load-configs"
      - name: "Configs + schema + targets loaded"
        check: "node verify.mjs schema-valid --out fixtures/config-validation/config-validation.out.json --ground fixtures/config-validation/config-validation.ground.json"

  - id: config-validation-loop
    type: loop
    over: configs
    as: config
    requires: [load-configs]
    steps:
      - id: validate-config
        instruction: |
          Validate <config>.
        gate:
          - check: "npx conductor-board check validate-config"
          - name: "Config conforms to the schema"
            check: "node verify.mjs schema-valid --out fixtures/config-validation/<item>.out.json --ground fixtures/config-validation/<item>.ground.json"
          - name: "Every cross-file reference resolves to a real target"
            check: "node verify.mjs refs-resolve --out fixtures/config-validation/<item>.out.json --ground fixtures/config-validation/<item>.ground.json"
          - "Values are mutually consistent (e.g. a timeout < a retry budget), not just individually valid."

  - id: config-validation-finish
    instruction: |
      Confirm every config valid + references resolve.
    requires: [config-validation-loop]
    gate:
      - check: "npx conductor-board check config-validation-finish"
      - name: "All configs validated"
        check: "node verify.mjs coverage-complete --out fixtures/config-validation/config-validation.out.json --ground fixtures/config-validation/config-validation.ground.json"
