conductor: 2.0.0
name: data-migration
description: >
  Move rows from the legacy schema to the new schema with zero data loss and correct type mapping.

steps:
  - id: scope-tables
    instruction: |
      List every legacy table to migrate. For each, snapshot source row count + a checksum of
      key columns into fixtures/<id>/<table>.ground.json — the truth the migration is checked against.
    output: tables
    gate:
      - check: "npx conductor-board check scope-tables"
      - name: "Source snapshot captured for every table"
        check: "node verify.mjs rowcount-match --out fixtures/data-migration/data-migration.out.json --ground fixtures/data-migration/data-migration.ground.json"

  - id: data-migration-loop
    type: loop
    over: tables
    as: table
    requires: [scope-tables]
    steps:
      - id: migrate-table
        instruction: |
          Migrate <table>'s rows into the new schema, mapping each column type explicitly.
        gate:
          - check: "npx conductor-board check migrate-table"
          - name: "Destination row count equals source (zero loss)"
            check: "node verify.mjs rowcount-match --out fixtures/data-migration/<item>.out.json --ground fixtures/data-migration/<item>.ground.json"
          - name: "No NULLs introduced in NOT-NULL columns"
            check: "node verify.mjs no-new-nulls --out fixtures/data-migration/<item>.out.json --ground fixtures/data-migration/<item>.ground.json"
          - "Each type mapping is lossless for this table's real value range (e.g. no int overflow, no datetime-zone drift) — spot-checked against sampled source rows."

  - id: data-migration-finish
    instruction: |
      Confirm every table migrated with matching counts; produce a per-table loss report (must be 0 lost rows).
    requires: [data-migration-loop]
    gate:
      - check: "npx conductor-board check data-migration-finish"
      - name: "Zero rows lost across all tables"
        check: "node verify.mjs coverage-complete --out fixtures/data-migration/data-migration.out.json --ground fixtures/data-migration/data-migration.ground.json"
