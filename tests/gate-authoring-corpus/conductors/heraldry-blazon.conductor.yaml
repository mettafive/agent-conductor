conductor: 2.0.0
name: heraldry-blazon
description: >
  Validate each blazon: tincture rule (no colour-on-colour), grammar, and that it renders to the intended arms.

steps:
  - id: load-blazons
    instruction: |
      Load the blazons + the heraldic grammar rules (tincture classes, ordinary vocabulary) + each intended
      reference emblazon into the grounding bundle.
    output: blazons
    gate:
      - check: "npx conductor-board check load-blazons"
      - name: "Blazons + rules + references captured"
        check: "node verify.mjs tincture-rule --out fixtures/heraldry-blazon/heraldry-blazon.out.json --ground fixtures/heraldry-blazon/heraldry-blazon.ground.json"

  - id: heraldry-blazon-loop
    type: loop
    over: blazons
    as: blazon
    requires: [load-blazons]
    steps:
      - id: validate-blazon
        instruction: |
          Validate <blazon>.
        gate:
          - check: "npx conductor-board check validate-blazon"
          - name: "Tincture rule respected (no colour-on-colour / metal-on-metal)"
            check: "node verify.mjs tincture-rule --out fixtures/heraldry-blazon/<item>.out.json --ground fixtures/heraldry-blazon/<item>.ground.json"
          - name: "Blazon grammar is valid (parses to a real emblazon)"
            check: "node verify.mjs grammar-valid --out fixtures/heraldry-blazon/<item>.out.json --ground fixtures/heraldry-blazon/<item>.ground.json"
          - "Ordering (field, then charges, then ordinaries) and marshalling conventions are idiomatic, not just legal."

  - id: heraldry-blazon-finish
    instruction: |
      Confirm every blazon valid + tincture-compliant.
    requires: [heraldry-blazon-loop]
    gate:
      - check: "npx conductor-board check heraldry-blazon-finish"
      - name: "All blazons validated"
        check: "node verify.mjs coverage-complete --out fixtures/heraldry-blazon/heraldry-blazon.out.json --ground fixtures/heraldry-blazon/heraldry-blazon.ground.json"
