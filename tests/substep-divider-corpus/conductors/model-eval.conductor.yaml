conductor: 2.0.0
name: model-eval
description: >
  model eval — converted from a skill that names 5 distinct work-units.

steps:
  - id: scope-checkpoints
    instruction: |
      Scope the checkpoints to process. Frontload every checkpoint as a pending iteration.
    output: checkpoints
    gate:
      - check: "npx conductor-board check scope-checkpoints"
      - "Every checkpoint captured before any work begins"

  - id: model-eval-loop
    type: loop
    over: checkpoints
    as: checkpoint
    requires: [scope-checkpoints]
    steps:
      - id: load-checkpoint
        instruction: |
          load checkpoint: load checkpoint, model weights.
        gate:
          - check: "npx conductor-board check load-checkpoint"
          - name: "load checkpoint is correct"
            check: "node verify-unit.mjs load-checkpoint --out out/load-checkpoint.json"
      - id: run-benchmark
        instruction: |
          run benchmark: run benchmark, eval suite.
        gate:
          - check: "npx conductor-board check run-benchmark"
          - name: "run benchmark is correct"
            check: "node verify-unit.mjs run-benchmark --out out/run-benchmark.json"
      - id: per-category
        instruction: |
          per category: per category, breakdown.
        gate:
          - check: "npx conductor-board check per-category"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: regression-flag
        instruction: |
          regression flag: regression, compare baseline.
        gate:
          - check: "npx conductor-board check regression-flag"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: record-scores
        instruction: |
          record scores: record scores, leaderboard.
        gate:
          - check: "npx conductor-board check record-scores"
          - name: "record scores is correct"
            check: "node verify-unit.mjs record-scores --out out/record-scores.json"
