conductor: 2.0.0
name: feature-store
description: >
  feature store — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-features
    instruction: |
      Scope the features to process. Frontload every feature as a pending iteration.
    output: features
    gate:
      - check: "npx conductor-board check scope-features"
      - "Every feature captured before any work begins"

  - id: feature-store-loop
    type: loop
    over: features
    as: feature
    requires: [scope-features]
    steps:
      - id: compute-feature
        instruction: |
          compute feature: compute feature, transform.
        gate:
          - check: "npx conductor-board check compute-feature"
          - name: "compute feature is correct"
            check: "node verify-unit.mjs compute-feature --out out/compute-feature.json"
      - id: validate-feature
        instruction: |
          validate feature: validate, drift check.
        gate:
          - check: "npx conductor-board check validate-feature"
          - name: "validate feature is correct"
            check: "node verify-unit.mjs validate-feature --out out/validate-feature.json"
      - id: backfill
        instruction: |
          backfill: backfill, historical.
        gate:
          - check: "npx conductor-board check backfill"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: publish-feature
        instruction: |
          publish feature: publish, register feature.
        gate:
          - check: "npx conductor-board check publish-feature"
          - name: "publish feature is correct"
            check: "node verify-unit.mjs publish-feature --out out/publish-feature.json"
