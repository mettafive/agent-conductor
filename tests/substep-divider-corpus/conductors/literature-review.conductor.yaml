conductor: 2.0.0
name: literature-review
description: >
  literature review — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-papers
    instruction: |
      Scope the papers to process. Frontload every paper as a pending iteration.
    output: papers
    gate:
      - check: "npx conductor-board check scope-papers"
      - "Every paper captured before any work begins"

  - id: literature-review-loop
    type: loop
    over: papers
    as: paper
    requires: [scope-papers]
    steps:
      - id: fetch-paper
        instruction: |
          fetch paper: fetch, download paper.
        gate:
          - check: "npx conductor-board check fetch-paper"
          - name: "fetch paper is correct"
            check: "node verify-unit.mjs fetch-paper --out out/fetch-paper.json"
      - id: summarize
        instruction: |
          summarize: summarize, extract findings.
        gate:
          - check: "npx conductor-board check summarize"
          - name: "summarize is correct"
            check: "node verify-unit.mjs summarize --out out/summarize.json"
      - id: cite-extract
        instruction: |
          cite extract: citation, bibtex, reference.
        gate:
          - check: "npx conductor-board check cite-extract"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: synthesize
        instruction: |
          synthesize: synthesize, combine findings.
        gate:
          - check: "npx conductor-board check synthesize"
          - name: "synthesize is correct"
            check: "node verify-unit.mjs synthesize --out out/synthesize.json"
