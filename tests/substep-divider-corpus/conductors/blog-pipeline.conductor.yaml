conductor: 2.0.0
name: blog-pipeline
description: >
  blog pipeline — converted from a skill that names 5 distinct work-units.

steps:
  - id: scope-topics
    instruction: |
      Scope the topics to process. Frontload every topic as a pending iteration.
    output: topics
    gate:
      - check: "npx conductor-board check scope-topics"
      - "Every topic captured before any work begins"

  - id: blog-pipeline-loop
    type: loop
    over: topics
    as: topic
    requires: [scope-topics]
    steps:
      - id: outline
        instruction: |
          outline: outline, structure.
        gate:
          - check: "npx conductor-board check outline"
          - name: "outline is correct"
            check: "node verify-unit.mjs outline --out out/outline.json"
      - id: draft
        instruction: |
          draft: draft, write body.
        gate:
          - check: "npx conductor-board check draft"
          - name: "draft is correct"
            check: "node verify-unit.mjs draft --out out/draft.json"
      - id: seo-titles
        instruction: |
          seo titles: seo title, meta description, slug.
        gate:
          - check: "npx conductor-board check seo-titles"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: internal-links
        instruction: |
          internal links: internal link, interlink, related posts.
        gate:
          - check: "npx conductor-board check internal-links"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: publish
        instruction: |
          publish: publish, ship, cms.
        gate:
          - check: "npx conductor-board check publish"
          - name: "publish is correct"
            check: "node verify-unit.mjs publish --out out/publish.json"
