conductor: 2.0.0
name: lutherie-setup
description: >
  lutherie setup — converted from a skill that names 5 distinct work-units.

steps:
  - id: scope-instruments
    instruction: |
      Scope the instruments to process. Frontload every instrument as a pending iteration.
    output: instruments
    gate:
      - check: "npx conductor-board check scope-instruments"
      - "Every instrument captured before any work begins"

  - id: lutherie-setup-loop
    type: loop
    over: instruments
    as: instrument
    requires: [scope-instruments]
    steps:
      - id: measure-action
        instruction: |
          measure action: measure action, string height.
        gate:
          - check: "npx conductor-board check measure-action"
          - name: "measure action is correct"
            check: "node verify-unit.mjs measure-action --out out/measure-action.json"
      - id: adjust-truss
        instruction: |
          adjust truss: adjust truss, neck relief.
        gate:
          - check: "npx conductor-board check adjust-truss"
          - name: "adjust truss is correct"
            check: "node verify-unit.mjs adjust-truss --out out/adjust-truss.json"
      - id: intonation
        instruction: |
          intonation: intonation, saddle.
        gate:
          - check: "npx conductor-board check intonation"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: nut-slots
        instruction: |
          nut slots: nut slot, file nut.
        gate:
          - check: "npx conductor-board check nut-slots"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: final-tune
        instruction: |
          final tune: final tune, string up.
        gate:
          - check: "npx conductor-board check final-tune"
          - name: "final tune is correct"
            check: "node verify-unit.mjs final-tune --out out/final-tune.json"
