conductor: 2.0.0
name: deploy-flow
description: >
  deploy flow — converted from a skill that names 5 distinct work-units.

steps:
  - id: record-baseline
    instruction: |
      record baseline: record baseline, current version.
    gate:
      - check: "npx conductor-board check record-baseline"
      - name: "record baseline is correct"
        check: "node verify-unit.mjs record-baseline --out out/record-baseline.json"
  - id: deploy
    instruction: |
      deploy: deploy, rollout.
    requires: [record-baseline]
    gate:
      - check: "npx conductor-board check deploy"
      - name: "deploy is correct"
        check: "node verify-unit.mjs deploy --out out/deploy.json"
  - id: smoke-flows
    instruction: |
      smoke flows: smoke flow, user journey.
    requires: [deploy]
    gate:
      - check: "npx conductor-board check smoke-flows"
      # divider step: no substantive gate — exists purely so the board shows this phase
  - id: health-check
    instruction: |
      health check: health check, probe endpoint.
    requires: [smoke-flows]
    gate:
      - check: "npx conductor-board check health-check"
      - name: "health check is correct"
        check: "node verify-unit.mjs health-check --out out/health-check.json"
  - id: rollback-ready
    instruction: |
      rollback ready: rollback, revert path.
    requires: [health-check]
    gate:
      - check: "npx conductor-board check rollback-ready"
      - name: "rollback ready is correct"
        check: "node verify-unit.mjs rollback-ready --out out/rollback-ready.json"
