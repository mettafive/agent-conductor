conductor: 2.0.0
name: orienteering-course
description: >
  orienteering course — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-controls
    instruction: |
      Scope the controls to process. Frontload every control as a pending iteration.
    output: controls
    gate:
      - check: "npx conductor-board check scope-controls"
      - "Every control captured before any work begins"

  - id: orienteering-course-loop
    type: loop
    over: controls
    as: control
    requires: [scope-controls]
    steps:
      - id: place-control
        instruction: |
          place control: place control, feature pick.
        gate:
          - check: "npx conductor-board check place-control"
          - name: "place control is correct"
            check: "node verify-unit.mjs place-control --out out/place-control.json"
      - id: set-difficulty
        instruction: |
          set difficulty: set difficulty, leg length.
        gate:
          - check: "npx conductor-board check set-difficulty"
          - name: "set difficulty is correct"
            check: "node verify-unit.mjs set-difficulty --out out/set-difficulty.json"
      - id: legality-check
        instruction: |
          legality check: legality, out of bounds.
        gate:
          - check: "npx conductor-board check legality-check"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: print-control-desc
        instruction: |
          print control desc: control description, clue sheet.
        gate:
          - check: "npx conductor-board check print-control-desc"
          - name: "print control desc is correct"
            check: "node verify-unit.mjs print-control-desc --out out/print-control-desc.json"
