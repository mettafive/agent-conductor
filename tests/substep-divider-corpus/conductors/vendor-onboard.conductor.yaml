conductor: 2.0.0
name: vendor-onboard
description: >
  vendor onboard — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-vendors
    instruction: |
      Scope the vendors to process. Frontload every vendor as a pending iteration.
    output: vendors
    gate:
      - check: "npx conductor-board check scope-vendors"
      - "Every vendor captured before any work begins"

  - id: vendor-onboard-loop
    type: loop
    over: vendors
    as: vendor
    requires: [scope-vendors]
    steps:
      - id: collect-docs
        instruction: |
          collect docs: collect docs, w9 insurance.
        gate:
          - check: "npx conductor-board check collect-docs"
          - name: "collect docs is correct"
            check: "node verify-unit.mjs collect-docs --out out/collect-docs.json"
      - id: verify-vendor
        instruction: |
          verify vendor: verify, background check.
        gate:
          - check: "npx conductor-board check verify-vendor"
          - name: "verify vendor is correct"
            check: "node verify-unit.mjs verify-vendor --out out/verify-vendor.json"
      - id: risk-tier
        instruction: |
          risk tier: risk tier, classify risk.
        gate:
          - check: "npx conductor-board check risk-tier"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: activate
        instruction: |
          activate: activate, approve vendor.
        gate:
          - check: "npx conductor-board check activate"
          - name: "activate is correct"
            check: "node verify-unit.mjs activate --out out/activate.json"
