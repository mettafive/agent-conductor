conductor: 2.0.0
name: study-plan
description: >
  study plan — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-subjects
    instruction: |
      Scope the subjects to process. Frontload every subject as a pending iteration.
    output: subjects
    gate:
      - check: "npx conductor-board check scope-subjects"
      - "Every subject captured before any work begins"

  - id: study-plan-loop
    type: loop
    over: subjects
    as: subject
    requires: [scope-subjects]
    steps:
      - id: assess-level
        instruction: |
          assess level: assess level, diagnostic.
        gate:
          - check: "npx conductor-board check assess-level"
          - name: "assess level is correct"
            check: "node verify-unit.mjs assess-level --out out/assess-level.json"
      - id: build-schedule
        instruction: |
          build schedule: build schedule, study plan.
        gate:
          - check: "npx conductor-board check build-schedule"
          - name: "build schedule is correct"
            check: "node verify-unit.mjs build-schedule --out out/build-schedule.json"
      - id: spaced-repetition
        instruction: |
          spaced repetition: spaced repetition, review intervals.
        gate:
          - check: "npx conductor-board check spaced-repetition"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: track-progress
        instruction: |
          track progress: track progress, log sessions.
        gate:
          - check: "npx conductor-board check track-progress"
          - name: "track progress is correct"
            check: "node verify-unit.mjs track-progress --out out/track-progress.json"
