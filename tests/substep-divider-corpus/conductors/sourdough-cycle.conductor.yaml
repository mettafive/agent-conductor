conductor: 2.0.0
name: sourdough-cycle
description: >
  sourdough cycle — converted from a skill that names 5 distinct work-units.

steps:
  - id: scope-loaves
    instruction: |
      Scope the loaves to process. Frontload every loaf as a pending iteration.
    output: loaves
    gate:
      - check: "npx conductor-board check scope-loaves"
      - "Every loaf captured before any work begins"

  - id: sourdough-cycle-loop
    type: loop
    over: loaves
    as: loaf
    requires: [scope-loaves]
    steps:
      - id: levain-build
        instruction: |
          levain build: levain, starter feed.
        gate:
          - check: "npx conductor-board check levain-build"
          - name: "levain build is correct"
            check: "node verify-unit.mjs levain-build --out out/levain-build.json"
      - id: autolyse-mix
        instruction: |
          autolyse mix: autolyse, mix dough.
        gate:
          - check: "npx conductor-board check autolyse-mix"
          - name: "autolyse mix is correct"
            check: "node verify-unit.mjs autolyse-mix --out out/autolyse-mix.json"
      - id: fold-schedule
        instruction: |
          fold schedule: fold, stretch and fold.
        gate:
          - check: "npx conductor-board check fold-schedule"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: retard
        instruction: |
          retard: retard, cold proof.
        gate:
          - check: "npx conductor-board check retard"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: bake
        instruction: |
          bake: bake, score and bake.
        gate:
          - check: "npx conductor-board check bake"
          - name: "bake is correct"
            check: "node verify-unit.mjs bake --out out/bake.json"
