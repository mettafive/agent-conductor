conductor: 2.0.0
name: podcast-publish
description: >
  podcast publish — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-episodes
    instruction: |
      Scope the episodes to process. Frontload every episode as a pending iteration.
    output: episodes
    gate:
      - check: "npx conductor-board check scope-episodes"
      - "Every episode captured before any work begins"

  - id: podcast-publish-loop
    type: loop
    over: episodes
    as: episode
    requires: [scope-episodes]
    steps:
      - id: transcribe
        instruction: |
          transcribe: transcribe, transcript.
        gate:
          - check: "npx conductor-board check transcribe"
          - name: "transcribe is correct"
            check: "node verify-unit.mjs transcribe --out out/transcribe.json"
      - id: show-notes
        instruction: |
          show notes: show notes, episode notes.
        gate:
          - check: "npx conductor-board check show-notes"
          - name: "show notes is correct"
            check: "node verify-unit.mjs show-notes --out out/show-notes.json"
      - id: chapter-marks
        instruction: |
          chapter marks: chapter, timestamps.
        gate:
          - check: "npx conductor-board check chapter-marks"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: publish-feed
        instruction: |
          publish feed: publish, rss feed.
        gate:
          - check: "npx conductor-board check publish-feed"
          - name: "publish feed is correct"
            check: "node verify-unit.mjs publish-feed --out out/publish-feed.json"
