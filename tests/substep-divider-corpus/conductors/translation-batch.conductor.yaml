conductor: 2.0.0
name: translation-batch
description: >
  translation batch — converted from a skill that names 5 distinct work-units.

steps:
  - id: scope-segments
    instruction: |
      Scope the segments to process. Frontload every segment as a pending iteration.
    output: segments
    gate:
      - check: "npx conductor-board check scope-segments"
      - "Every segment captured before any work begins"

  - id: translation-batch-loop
    type: loop
    over: segments
    as: segment
    requires: [scope-segments]
    steps:
      - id: load-segment
        instruction: |
          load segment: load segment, source text.
        gate:
          - check: "npx conductor-board check load-segment"
          - name: "load segment is correct"
            check: "node verify-unit.mjs load-segment --out out/load-segment.json"
      - id: translate
        instruction: |
          translate: translate, render target.
        gate:
          - check: "npx conductor-board check translate"
          - name: "translate is correct"
            check: "node verify-unit.mjs translate --out out/translate.json"
      - id: glossary-enforce
        instruction: |
          glossary enforce: glossary, do not translate.
        gate:
          - check: "npx conductor-board check glossary-enforce"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: number-preserve
        instruction: |
          number preserve: number preserve, units.
        gate:
          - check: "npx conductor-board check number-preserve"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: save-translation
        instruction: |
          save translation: save, write output.
        gate:
          - check: "npx conductor-board check save-translation"
          - name: "save translation is correct"
            check: "node verify-unit.mjs save-translation --out out/save-translation.json"
