conductor: 2.0.0
name: refactor-pass
description: >
  refactor pass — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-files
    instruction: |
      Scope the files to process. Frontload every file as a pending iteration.
    output: files
    gate:
      - check: "npx conductor-board check scope-files"
      - "Every file captured before any work begins"

  - id: refactor-pass-loop
    type: loop
    over: files
    as: file
    requires: [scope-files]
    steps:
      - id: baseline
        instruction: |
          baseline: baseline, snapshot tests.
        gate:
          - check: "npx conductor-board check baseline"
          - name: "baseline is correct"
            check: "node verify-unit.mjs baseline --out out/baseline.json"
      - id: refactor
        instruction: |
          refactor: refactor, restructure.
        gate:
          - check: "npx conductor-board check refactor"
          - name: "refactor is correct"
            check: "node verify-unit.mjs refactor --out out/refactor.json"
      - id: rename-symbols
        instruction: |
          rename symbols: rename, symbol cleanup.
        gate:
          - check: "npx conductor-board check rename-symbols"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: verify-green
        instruction: |
          verify green: verify green, tests pass.
        gate:
          - check: "npx conductor-board check verify-green"
          - name: "verify green is correct"
            check: "node verify-unit.mjs verify-green --out out/verify-green.json"
