conductor: 2.0.0
name: store-locator-import
description: >
  store locator import — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-stores
    instruction: |
      Scope the stores to process. Frontload every store as a pending iteration.
    output: stores
    gate:
      - check: "npx conductor-board check scope-stores"
      - "Every store captured before any work begins"

  - id: store-locator-import-loop
    type: loop
    over: stores
    as: store
    requires: [scope-stores]
    steps:
      - id: normalize-store
        instruction: |
          normalize store: normalize, clean record.
        gate:
          - check: "npx conductor-board check normalize-store"
          - name: "normalize store is correct"
            check: "node verify-unit.mjs normalize-store --out out/normalize-store.json"
      - id: geocode-store
        instruction: |
          geocode store: geocode, coordinates.
        gate:
          - check: "npx conductor-board check geocode-store"
          - name: "geocode store is correct"
            check: "node verify-unit.mjs geocode-store --out out/geocode-store.json"
      - id: hours-parse
        instruction: |
          hours parse: hours, opening times.
        gate:
          - check: "npx conductor-board check hours-parse"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: save-store
        instruction: |
          save store: save, store record.
        gate:
          - check: "npx conductor-board check save-store"
          - name: "save store is correct"
            check: "node verify-unit.mjs save-store --out out/save-store.json"
