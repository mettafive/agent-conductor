conductor: 2.0.0
name: menu-nutrition
description: >
  menu nutrition — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-items
    instruction: |
      Scope the items to process. Frontload every item as a pending iteration.
    output: items
    gate:
      - check: "npx conductor-board check scope-items"
      - "Every item captured before any work begins"

  - id: menu-nutrition-loop
    type: loop
    over: items
    as: item
    requires: [scope-items]
    steps:
      - id: lookup-ingredients
        instruction: |
          lookup ingredients: lookup ingredients, components.
        gate:
          - check: "npx conductor-board check lookup-ingredients"
          - name: "lookup ingredients is correct"
            check: "node verify-unit.mjs lookup-ingredients --out out/lookup-ingredients.json"
      - id: compute-nutrition
        instruction: |
          compute nutrition: compute nutrition, calories macros.
        gate:
          - check: "npx conductor-board check compute-nutrition"
          - name: "compute nutrition is correct"
            check: "node verify-unit.mjs compute-nutrition --out out/compute-nutrition.json"
      - id: allergen-label
        instruction: |
          allergen label: allergen, label.
        gate:
          - check: "npx conductor-board check allergen-label"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: publish-nutrition
        instruction: |
          publish nutrition: publish, save label.
        gate:
          - check: "npx conductor-board check publish-nutrition"
          - name: "publish nutrition is correct"
            check: "node verify-unit.mjs publish-nutrition --out out/publish-nutrition.json"
