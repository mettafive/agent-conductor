conductor: 2.0.0
name: seo-audit
description: >
  seo audit — converted from a skill that names 5 distinct work-units.

steps:
  - id: scope-pages
    instruction: |
      Scope the pages to process. Frontload every page as a pending iteration.
    output: pages
    gate:
      - check: "npx conductor-board check scope-pages"
      - "Every page captured before any work begins"

  - id: seo-audit-loop
    type: loop
    over: pages
    as: page
    requires: [scope-pages]
    steps:
      - id: crawl-page
        instruction: |
          crawl page: crawl, fetch page.
        gate:
          - check: "npx conductor-board check crawl-page"
          - name: "crawl page is correct"
            check: "node verify-unit.mjs crawl-page --out out/crawl-page.json"
      - id: audit-meta
        instruction: |
          audit meta: audit meta, title description.
        gate:
          - check: "npx conductor-board check audit-meta"
          - name: "audit meta is correct"
            check: "node verify-unit.mjs audit-meta --out out/audit-meta.json"
      - id: schema-check
        instruction: |
          schema check: schema, json-ld, structured data.
        gate:
          - check: "npx conductor-board check schema-check"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: speed-check
        instruction: |
          speed check: speed, core web vitals, lcp.
        gate:
          - check: "npx conductor-board check speed-check"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: recommend-fixes
        instruction: |
          recommend fixes: recommend, fixes.
        gate:
          - check: "npx conductor-board check recommend-fixes"
          - name: "recommend fixes is correct"
            check: "node verify-unit.mjs recommend-fixes --out out/recommend-fixes.json"
