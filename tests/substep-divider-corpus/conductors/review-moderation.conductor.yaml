conductor: 2.0.0
name: review-moderation
description: >
  review moderation — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-reviews
    instruction: |
      Scope the reviews to process. Frontload every review as a pending iteration.
    output: reviews
    gate:
      - check: "npx conductor-board check scope-reviews"
      - "Every review captured before any work begins"

  - id: review-moderation-loop
    type: loop
    over: reviews
    as: review
    requires: [scope-reviews]
    steps:
      - id: read-review
        instruction: |
          read review: read review, load review.
        gate:
          - check: "npx conductor-board check read-review"
          - name: "read review is correct"
            check: "node verify-unit.mjs read-review --out out/read-review.json"
      - id: moderate
        instruction: |
          moderate: moderate, approve reject.
        gate:
          - check: "npx conductor-board check moderate"
          - name: "moderate is correct"
            check: "node verify-unit.mjs moderate --out out/moderate.json"
      - id: spam-check
        instruction: |
          spam check: spam, fake review.
        gate:
          - check: "npx conductor-board check spam-check"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: publish-review
        instruction: |
          publish review: publish, post review.
        gate:
          - check: "npx conductor-board check publish-review"
          - name: "publish review is correct"
            check: "node verify-unit.mjs publish-review --out out/publish-review.json"
