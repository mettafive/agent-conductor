conductor: 2.0.0
name: kb-refresh
description: >
  kb refresh — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-articles
    instruction: |
      Scope the articles to process. Frontload every article as a pending iteration.
    output: articles
    gate:
      - check: "npx conductor-board check scope-articles"
      - "Every article captured before any work begins"

  - id: kb-refresh-loop
    type: loop
    over: articles
    as: article
    requires: [scope-articles]
    steps:
      - id: audit-article
        instruction: |
          audit article: audit, check staleness.
        gate:
          - check: "npx conductor-board check audit-article"
          - name: "audit article is correct"
            check: "node verify-unit.mjs audit-article --out out/audit-article.json"
      - id: update
        instruction: |
          update: update, rewrite.
        gate:
          - check: "npx conductor-board check update"
          - name: "update is correct"
            check: "node verify-unit.mjs update --out out/update.json"
      - id: screenshot-refresh
        instruction: |
          screenshot refresh: screenshot, refresh image.
        gate:
          - check: "npx conductor-board check screenshot-refresh"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: republish
        instruction: |
          republish: republish, save.
        gate:
          - check: "npx conductor-board check republish"
          - name: "republish is correct"
            check: "node verify-unit.mjs republish --out out/republish.json"
