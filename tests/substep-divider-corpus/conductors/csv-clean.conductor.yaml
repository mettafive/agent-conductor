conductor: 2.0.0
name: csv-clean
description: >
  csv clean — converted from a skill that names 5 distinct work-units.

steps:
  - id: profile
    instruction: |
      profile: profile, inspect dataset.
    gate:
      - check: "npx conductor-board check profile"
      - name: "profile is correct"
        check: "node verify-unit.mjs profile --out out/profile.json"
  - id: clean
    instruction: |
      clean: clean, fix values.
    requires: [profile]
    gate:
      - check: "npx conductor-board check clean"
      - name: "clean is correct"
        check: "node verify-unit.mjs clean --out out/clean.json"
  - id: normalize-dates
    instruction: |
      normalize dates: normalize date, date format.
    requires: [clean]
    gate:
      - check: "npx conductor-board check normalize-dates"
      # divider step: no substantive gate — exists purely so the board shows this phase
  - id: trim-whitespace
    instruction: |
      trim whitespace: trim whitespace, strip spaces.
    requires: [normalize-dates]
    gate:
      - check: "npx conductor-board check trim-whitespace"
      # divider step: no substantive gate — exists purely so the board shows this phase
  - id: export
    instruction: |
      export: export, write csv.
    requires: [trim-whitespace]
    gate:
      - check: "npx conductor-board check export"
      - name: "export is correct"
        check: "node verify-unit.mjs export --out out/export.json"
