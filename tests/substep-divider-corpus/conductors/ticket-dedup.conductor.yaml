conductor: 2.0.0
name: ticket-dedup
description: >
  ticket dedup — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-clusters
    instruction: |
      Scope the clusters to process. Frontload every cluster as a pending iteration.
    output: clusters
    gate:
      - check: "npx conductor-board check scope-clusters"
      - "Every cluster captured before any work begins"

  - id: ticket-dedup-loop
    type: loop
    over: clusters
    as: cluster
    requires: [scope-clusters]
    steps:
      - id: cluster
        instruction: |
          cluster: cluster, group tickets.
        gate:
          - check: "npx conductor-board check cluster"
          - name: "cluster is correct"
            check: "node verify-unit.mjs cluster --out out/cluster.json"
      - id: merge
        instruction: |
          merge: merge, dedupe tickets.
        gate:
          - check: "npx conductor-board check merge"
          - name: "merge is correct"
            check: "node verify-unit.mjs merge --out out/merge.json"
      - id: link-context
        instruction: |
          link context: link context, preserve links.
        gate:
          - check: "npx conductor-board check link-context"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: close-dupes
        instruction: |
          close dupes: close, resolve duplicates.
        gate:
          - check: "npx conductor-board check close-dupes"
          - name: "close dupes is correct"
            check: "node verify-unit.mjs close-dupes --out out/close-dupes.json"
