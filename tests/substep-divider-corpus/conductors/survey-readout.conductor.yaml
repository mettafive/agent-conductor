conductor: 2.0.0
name: survey-readout
description: >
  survey readout — converted from a skill that names 5 distinct work-units.

steps:
  - id: load-responses
    instruction: |
      load responses: load responses, raw data.
    gate:
      - check: "npx conductor-board check load-responses"
      - name: "load responses is correct"
        check: "node verify-unit.mjs load-responses --out out/load-responses.json"
  - id: compute-stats
    instruction: |
      compute stats: compute stats, percentages.
    requires: [load-responses]
    gate:
      - check: "npx conductor-board check compute-stats"
      - name: "compute stats is correct"
        check: "node verify-unit.mjs compute-stats --out out/compute-stats.json"
  - id: segment
    instruction: |
      segment: segment, by cohort.
    requires: [compute-stats]
    gate:
      - check: "npx conductor-board check segment"
      # divider step: no substantive gate — exists purely so the board shows this phase
  - id: theme-freetext
    instruction: |
      theme freetext: free text themes, open responses.
    requires: [segment]
    gate:
      - check: "npx conductor-board check theme-freetext"
      # divider step: no substantive gate — exists purely so the board shows this phase
  - id: write-summary
    instruction: |
      write summary: write summary, report.
    requires: [theme-freetext]
    gate:
      - check: "npx conductor-board check write-summary"
      - name: "write summary is correct"
        check: "node verify-unit.mjs write-summary --out out/write-summary.json"
