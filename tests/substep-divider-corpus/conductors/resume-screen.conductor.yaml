conductor: 2.0.0
name: resume-screen
description: >
  resume screen — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-candidates
    instruction: |
      Scope the candidates to process. Frontload every candidate as a pending iteration.
    output: candidates
    gate:
      - check: "npx conductor-board check scope-candidates"
      - "Every candidate captured before any work begins"

  - id: resume-screen-loop
    type: loop
    over: candidates
    as: candidate
    requires: [scope-candidates]
    steps:
      - id: parse-resume
        instruction: |
          parse resume: parse resume, extract.
        gate:
          - check: "npx conductor-board check parse-resume"
          - name: "parse resume is correct"
            check: "node verify-unit.mjs parse-resume --out out/parse-resume.json"
      - id: match-criteria
        instruction: |
          match criteria: match, rubric.
        gate:
          - check: "npx conductor-board check match-criteria"
          - name: "match criteria is correct"
            check: "node verify-unit.mjs match-criteria --out out/match-criteria.json"
      - id: bias-check
        instruction: |
          bias check: bias check, fairness.
        gate:
          - check: "npx conductor-board check bias-check"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: rank
        instruction: |
          rank: rank, shortlist.
        gate:
          - check: "npx conductor-board check rank"
          - name: "rank is correct"
            check: "node verify-unit.mjs rank --out out/rank.json"
