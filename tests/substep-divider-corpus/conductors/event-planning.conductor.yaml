conductor: 2.0.0
name: event-planning
description: >
  event planning — converted from a skill that names 6 distinct work-units.

steps:
  - id: book-venue
    instruction: |
      book venue: book venue, reserve space.
    gate:
      - check: "npx conductor-board check book-venue"
      - name: "book venue is correct"
        check: "node verify-unit.mjs book-venue --out out/book-venue.json"
  - id: invite-list
    instruction: |
      invite list: invite list, guest list.
    requires: [book-venue]
    gate:
      - check: "npx conductor-board check invite-list"
      - name: "invite list is correct"
        check: "node verify-unit.mjs invite-list --out out/invite-list.json"
  - id: schedule-program
    instruction: |
      schedule program: schedule program, agenda.
    requires: [invite-list]
    gate:
      - check: "npx conductor-board check schedule-program"
      - name: "schedule program is correct"
        check: "node verify-unit.mjs schedule-program --out out/schedule-program.json"
  - id: catering
    instruction: |
      catering: catering, menu order.
    requires: [schedule-program]
    gate:
      - check: "npx conductor-board check catering"
      # divider step: no substantive gate — exists purely so the board shows this phase
  - id: av-setup
    instruction: |
      av setup: av setup, audio visual.
    requires: [catering]
    gate:
      - check: "npx conductor-board check av-setup"
      # divider step: no substantive gate — exists purely so the board shows this phase
  - id: send-invites
    instruction: |
      send invites: send invites, rsvp.
    requires: [av-setup]
    gate:
      - check: "npx conductor-board check send-invites"
      - name: "send invites is correct"
        check: "node verify-unit.mjs send-invites --out out/send-invites.json"
