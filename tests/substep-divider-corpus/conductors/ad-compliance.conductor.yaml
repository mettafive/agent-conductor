conductor: 2.0.0
name: ad-compliance
description: >
  ad compliance — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-ads
    instruction: |
      Scope the ads to process. Frontload every ad as a pending iteration.
    output: ads
    gate:
      - check: "npx conductor-board check scope-ads"
      - "Every ad captured before any work begins"

  - id: ad-compliance-loop
    type: loop
    over: ads
    as: ad
    requires: [scope-ads]
    steps:
      - id: scan-ad
        instruction: |
          scan ad: scan ad, read creative.
        gate:
          - check: "npx conductor-board check scan-ad"
          - name: "scan ad is correct"
            check: "node verify-unit.mjs scan-ad --out out/scan-ad.json"
      - id: check-claims
        instruction: |
          check claims: check claims, substantiation.
        gate:
          - check: "npx conductor-board check check-claims"
          - name: "check claims is correct"
            check: "node verify-unit.mjs check-claims --out out/check-claims.json"
      - id: disclosure-check
        instruction: |
          disclosure check: disclosure, fine print.
        gate:
          - check: "npx conductor-board check disclosure-check"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: approve-ad
        instruction: |
          approve ad: approve, verdict.
        gate:
          - check: "npx conductor-board check approve-ad"
          - name: "approve ad is correct"
            check: "node verify-unit.mjs approve-ad --out out/approve-ad.json"
