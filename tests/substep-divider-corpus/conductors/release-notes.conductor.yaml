conductor: 2.0.0
name: release-notes
description: >
  release notes — converted from a skill that names 5 distinct work-units.

steps:
  - id: collect-prs
    instruction: |
      collect prs: collect prs, merged commits, git log.
    gate:
      - check: "npx conductor-board check collect-prs"
      - name: "collect prs is correct"
        check: "node verify-unit.mjs collect-prs --out out/collect-prs.json"
  - id: categorize
    instruction: |
      categorize: categorize, group by type.
    requires: [collect-prs]
    gate:
      - check: "npx conductor-board check categorize"
      - name: "categorize is correct"
        check: "node verify-unit.mjs categorize --out out/categorize.json"
  - id: write-notes
    instruction: |
      write notes: write notes, draft changelog.
    requires: [categorize]
    gate:
      - check: "npx conductor-board check write-notes"
      - name: "write notes is correct"
        check: "node verify-unit.mjs write-notes --out out/write-notes.json"
  - id: highlight-breaking
    instruction: |
      highlight breaking: breaking change, migration note.
    requires: [write-notes]
    gate:
      - check: "npx conductor-board check highlight-breaking"
      # divider step: no substantive gate — exists purely so the board shows this phase
  - id: publish-notes
    instruction: |
      publish notes: publish, tag release.
    requires: [highlight-breaking]
    gate:
      - check: "npx conductor-board check publish-notes"
      - name: "publish notes is correct"
        check: "node verify-unit.mjs publish-notes --out out/publish-notes.json"
