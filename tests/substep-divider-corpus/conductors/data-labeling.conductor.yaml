conductor: 2.0.0
name: data-labeling
description: >
  data labeling — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-items
    instruction: |
      Scope the items to process. Frontload every item as a pending iteration.
    output: items
    gate:
      - check: "npx conductor-board check scope-items"
      - "Every item captured before any work begins"

  - id: data-labeling-loop
    type: loop
    over: items
    as: item
    requires: [scope-items]
    steps:
      - id: load-item
        instruction: |
          load item: load item, fetch sample.
        gate:
          - check: "npx conductor-board check load-item"
          - name: "load item is correct"
            check: "node verify-unit.mjs load-item --out out/load-item.json"
      - id: label
        instruction: |
          label: label, annotate.
        gate:
          - check: "npx conductor-board check label"
          - name: "label is correct"
            check: "node verify-unit.mjs label --out out/label.json"
      - id: confidence-mark
        instruction: |
          confidence mark: confidence, uncertain flag.
        gate:
          - check: "npx conductor-board check confidence-mark"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: save-label
        instruction: |
          save label: save label, store annotation.
        gate:
          - check: "npx conductor-board check save-label"
          - name: "save label is correct"
            check: "node verify-unit.mjs save-label --out out/save-label.json"
