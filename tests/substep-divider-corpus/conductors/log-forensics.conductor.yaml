conductor: 2.0.0
name: log-forensics
description: >
  log forensics — converted from a skill that names 4 distinct work-units.

steps:
  - id: ingest-logs
    instruction: |
      ingest logs: ingest logs, load logs.
    gate:
      - check: "npx conductor-board check ingest-logs"
      - name: "ingest logs is correct"
        check: "node verify-unit.mjs ingest-logs --out out/ingest-logs.json"
  - id: correlate
    instruction: |
      correlate: correlate, timeline.
    requires: [ingest-logs]
    gate:
      - check: "npx conductor-board check correlate"
      - name: "correlate is correct"
        check: "node verify-unit.mjs correlate --out out/correlate.json"
  - id: error-cluster
    instruction: |
      error cluster: error cluster, group errors.
    requires: [correlate]
    gate:
      - check: "npx conductor-board check error-cluster"
      # divider step: no substantive gate — exists purely so the board shows this phase
  - id: diagnose
    instruction: |
      diagnose: diagnose, root cause.
    requires: [error-cluster]
    gate:
      - check: "npx conductor-board check diagnose"
      - name: "diagnose is correct"
        check: "node verify-unit.mjs diagnose --out out/diagnose.json"
