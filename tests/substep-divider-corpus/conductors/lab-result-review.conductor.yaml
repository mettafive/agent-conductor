conductor: 2.0.0
name: lab-result-review
description: >
  lab result review — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-panels
    instruction: |
      Scope the panels to process. Frontload every panel as a pending iteration.
    output: panels
    gate:
      - check: "npx conductor-board check scope-panels"
      - "Every panel captured before any work begins"

  - id: lab-result-review-loop
    type: loop
    over: panels
    as: panel
    requires: [scope-panels]
    steps:
      - id: ingest-results
        instruction: |
          ingest results: ingest results, lab values.
        gate:
          - check: "npx conductor-board check ingest-results"
          - name: "ingest results is correct"
            check: "node verify-unit.mjs ingest-results --out out/ingest-results.json"
      - id: flag-abnormal
        instruction: |
          flag abnormal: flag abnormal, out of range.
        gate:
          - check: "npx conductor-board check flag-abnormal"
          - name: "flag abnormal is correct"
            check: "node verify-unit.mjs flag-abnormal --out out/flag-abnormal.json"
      - id: trend-compare
        instruction: |
          trend compare: trend, compare prior.
        gate:
          - check: "npx conductor-board check trend-compare"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: notify
        instruction: |
          notify: notify, alert clinician.
        gate:
          - check: "npx conductor-board check notify"
          - name: "notify is correct"
            check: "node verify-unit.mjs notify --out out/notify.json"
