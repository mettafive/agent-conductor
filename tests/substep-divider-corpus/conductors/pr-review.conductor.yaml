conductor: 2.0.0
name: pr-review
description: >
  pr review — converted from a skill that names 5 distinct work-units.

steps:
  - id: scope-files
    instruction: |
      Scope the files to process. Frontload every file as a pending iteration.
    output: files
    gate:
      - check: "npx conductor-board check scope-files"
      - "Every file captured before any work begins"

  - id: pr-review-loop
    type: loop
    over: files
    as: file
    requires: [scope-files]
    steps:
      - id: read-diff
        instruction: |
          read diff: read diff, load changes.
        gate:
          - check: "npx conductor-board check read-diff"
          - name: "read diff is correct"
            check: "node verify-unit.mjs read-diff --out out/read-diff.json"
      - id: review
        instruction: |
          review: review, find defects.
        gate:
          - check: "npx conductor-board check review"
          - name: "review is correct"
            check: "node verify-unit.mjs review --out out/review.json"
      - id: style-check
        instruction: |
          style check: style, lint, formatting.
        gate:
          - check: "npx conductor-board check style-check"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: security-scan
        instruction: |
          security scan: security, vuln, injection.
        gate:
          - check: "npx conductor-board check security-scan"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: comment
        instruction: |
          comment: comment, post review.
        gate:
          - check: "npx conductor-board check comment"
          - name: "comment is correct"
            check: "node verify-unit.mjs comment --out out/comment.json"
