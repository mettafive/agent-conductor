conductor: 2.0.0
name: playlist-curate
description: >
  playlist curate — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-moods
    instruction: |
      Scope the moods to process. Frontload every mood as a pending iteration.
    output: moods
    gate:
      - check: "npx conductor-board check scope-moods"
      - "Every mood captured before any work begins"

  - id: playlist-curate-loop
    type: loop
    over: moods
    as: mood
    requires: [scope-moods]
    steps:
      - id: seed-tracks
        instruction: |
          seed tracks: seed tracks, starting songs.
        gate:
          - check: "npx conductor-board check seed-tracks"
          - name: "seed tracks is correct"
            check: "node verify-unit.mjs seed-tracks --out out/seed-tracks.json"
      - id: expand
        instruction: |
          expand: expand, recommend tracks.
        gate:
          - check: "npx conductor-board check expand"
          - name: "expand is correct"
            check: "node verify-unit.mjs expand --out out/expand.json"
      - id: flow-order
        instruction: |
          flow order: flow order, sequence, transitions.
        gate:
          - check: "npx conductor-board check flow-order"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: save-playlist
        instruction: |
          save playlist: save playlist, publish.
        gate:
          - check: "npx conductor-board check save-playlist"
          - name: "save playlist is correct"
            check: "node verify-unit.mjs save-playlist --out out/save-playlist.json"
