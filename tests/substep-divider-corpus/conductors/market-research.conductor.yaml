conductor: 2.0.0
name: market-research
description: >
  market research — converted from a skill that names 5 distinct work-units.

steps:
  - id: scope-competitors
    instruction: |
      Scope the competitors to process. Frontload every competitor as a pending iteration.
    output: competitors
    gate:
      - check: "npx conductor-board check scope-competitors"
      - "Every competitor captured before any work begins"

  - id: market-research-loop
    type: loop
    over: competitors
    as: competitor
    requires: [scope-competitors]
    steps:
      - id: collect-data
        instruction: |
          collect data: collect, scrape competitor.
        gate:
          - check: "npx conductor-board check collect-data"
          - name: "collect data is correct"
            check: "node verify-unit.mjs collect-data --out out/collect-data.json"
      - id: analyze
        instruction: |
          analyze: analyze, compare features.
        gate:
          - check: "npx conductor-board check analyze"
          - name: "analyze is correct"
            check: "node verify-unit.mjs analyze --out out/analyze.json"
      - id: pricing-table
        instruction: |
          pricing table: pricing table, price compare.
        gate:
          - check: "npx conductor-board check pricing-table"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: swot
        instruction: |
          swot: swot, strengths weaknesses.
        gate:
          - check: "npx conductor-board check swot"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: report
        instruction: |
          report: report, writeup.
        gate:
          - check: "npx conductor-board check report"
          - name: "report is correct"
            check: "node verify-unit.mjs report --out out/report.json"
