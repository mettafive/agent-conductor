conductor: 2.0.0
name: dep-bump
description: >
  dep bump — converted from a skill that names 5 distinct work-units.

steps:
  - id: scope-deps
    instruction: |
      Scope the deps to process. Frontload every dep as a pending iteration.
    output: deps
    gate:
      - check: "npx conductor-board check scope-deps"
      - "Every dep captured before any work begins"

  - id: dep-bump-loop
    type: loop
    over: deps
    as: dep
    requires: [scope-deps]
    steps:
      - id: check-version
        instruction: |
          check version: check version, latest release.
        gate:
          - check: "npx conductor-board check check-version"
          - name: "check version is correct"
            check: "node verify-unit.mjs check-version --out out/check-version.json"
      - id: upgrade
        instruction: |
          upgrade: upgrade, bump version.
        gate:
          - check: "npx conductor-board check upgrade"
          - name: "upgrade is correct"
            check: "node verify-unit.mjs upgrade --out out/upgrade.json"
      - id: cve-scan
        instruction: |
          cve scan: cve, advisory, audit.
        gate:
          - check: "npx conductor-board check cve-scan"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: changelog-read
        instruction: |
          changelog read: read changelog, migration guide.
        gate:
          - check: "npx conductor-board check changelog-read"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: build
        instruction: |
          build: build, run tests.
        gate:
          - check: "npx conductor-board check build"
          - name: "build is correct"
            check: "node verify-unit.mjs build --out out/build.json"
