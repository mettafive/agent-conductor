conductor: 2.0.0
name: fleet-maintenance
description: >
  fleet maintenance — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-vehicles
    instruction: |
      Scope the vehicles to process. Frontload every vehicle as a pending iteration.
    output: vehicles
    gate:
      - check: "npx conductor-board check scope-vehicles"
      - "Every vehicle captured before any work begins"

  - id: fleet-maintenance-loop
    type: loop
    over: vehicles
    as: vehicle
    requires: [scope-vehicles]
    steps:
      - id: read-telemetry
        instruction: |
          read telemetry: read telemetry, diagnostics.
        gate:
          - check: "npx conductor-board check read-telemetry"
          - name: "read telemetry is correct"
            check: "node verify-unit.mjs read-telemetry --out out/read-telemetry.json"
      - id: assess-wear
        instruction: |
          assess wear: assess wear, maintenance need.
        gate:
          - check: "npx conductor-board check assess-wear"
          - name: "assess wear is correct"
            check: "node verify-unit.mjs assess-wear --out out/assess-wear.json"
      - id: schedule-service
        instruction: |
          schedule service: schedule service, book slot.
        gate:
          - check: "npx conductor-board check schedule-service"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: log-record
        instruction: |
          log record: log, maintenance record.
        gate:
          - check: "npx conductor-board check log-record"
          - name: "log record is correct"
            check: "node verify-unit.mjs log-record --out out/log-record.json"
