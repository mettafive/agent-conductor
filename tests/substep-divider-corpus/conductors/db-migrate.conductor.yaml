conductor: 2.0.0
name: db-migrate
description: >
  db migrate — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-migrations
    instruction: |
      Scope the migrations to process. Frontload every migration as a pending iteration.
    output: migrations
    gate:
      - check: "npx conductor-board check scope-migrations"
      - "Every migration captured before any work begins"

  - id: db-migrate-loop
    type: loop
    over: migrations
    as: migration
    requires: [scope-migrations]
    steps:
      - id: backup
        instruction: |
          backup: backup, snapshot.
        gate:
          - check: "npx conductor-board check backup"
          - name: "backup is correct"
            check: "node verify-unit.mjs backup --out out/backup.json"
      - id: apply-migration
        instruction: |
          apply migration: apply migration, run migration.
        gate:
          - check: "npx conductor-board check apply-migration"
          - name: "apply migration is correct"
            check: "node verify-unit.mjs apply-migration --out out/apply-migration.json"
      - id: verify-indexes
        instruction: |
          verify indexes: verify index, reindex.
        gate:
          - check: "npx conductor-board check verify-indexes"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: smoke-test
        instruction: |
          smoke test: smoke test, query check.
        gate:
          - check: "npx conductor-board check smoke-test"
          - name: "smoke test is correct"
            check: "node verify-unit.mjs smoke-test --out out/smoke-test.json"
