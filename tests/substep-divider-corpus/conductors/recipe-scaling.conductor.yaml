conductor: 2.0.0
name: recipe-scaling
description: >
  recipe scaling — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-recipes
    instruction: |
      Scope the recipes to process. Frontload every recipe as a pending iteration.
    output: recipes
    gate:
      - check: "npx conductor-board check scope-recipes"
      - "Every recipe captured before any work begins"

  - id: recipe-scaling-loop
    type: loop
    over: recipes
    as: recipe
    requires: [scope-recipes]
    steps:
      - id: read-recipe
        instruction: |
          read recipe: read recipe, ingredients.
        gate:
          - check: "npx conductor-board check read-recipe"
          - name: "read recipe is correct"
            check: "node verify-unit.mjs read-recipe --out out/read-recipe.json"
      - id: scale
        instruction: |
          scale: scale, adjust quantities.
        gate:
          - check: "npx conductor-board check scale"
          - name: "scale is correct"
            check: "node verify-unit.mjs scale --out out/scale.json"
      - id: unit-convert
        instruction: |
          unit convert: unit convert, metric imperial.
        gate:
          - check: "npx conductor-board check unit-convert"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: save-recipe
        instruction: |
          save recipe: save, store recipe.
        gate:
          - check: "npx conductor-board check save-recipe"
          - name: "save recipe is correct"
            check: "node verify-unit.mjs save-recipe --out out/save-recipe.json"
