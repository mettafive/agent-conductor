conductor: 2.0.0
name: fresco-restoration
description: >
  fresco restoration — converted from a skill that names 5 distinct work-units.

steps:
  - id: scope-panels
    instruction: |
      Scope the panels to process. Frontload every panel as a pending iteration.
    output: panels
    gate:
      - check: "npx conductor-board check scope-panels"
      - "Every panel captured before any work begins"

  - id: fresco-restoration-loop
    type: loop
    over: panels
    as: panel
    requires: [scope-panels]
    steps:
      - id: survey-damage
        instruction: |
          survey damage: survey damage, condition map.
        gate:
          - check: "npx conductor-board check survey-damage"
          - name: "survey damage is correct"
            check: "node verify-unit.mjs survey-damage --out out/survey-damage.json"
      - id: consolidate
        instruction: |
          consolidate: consolidate, stabilize plaster.
        gate:
          - check: "npx conductor-board check consolidate"
          - name: "consolidate is correct"
            check: "node verify-unit.mjs consolidate --out out/consolidate.json"
      - id: retouch-tratteggio
        instruction: |
          retouch tratteggio: tratteggio, in-painting.
        gate:
          - check: "npx conductor-board check retouch-tratteggio"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: uv-document
        instruction: |
          uv document: uv, document layers.
        gate:
          - check: "npx conductor-board check uv-document"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: final-varnish
        instruction: |
          final varnish: varnish, protective coat.
        gate:
          - check: "npx conductor-board check final-varnish"
          - name: "final varnish is correct"
            check: "node verify-unit.mjs final-varnish --out out/final-varnish.json"
