conductor: 2.0.0
name: raku-firing
description: >
  raku firing — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-pieces
    instruction: |
      Scope the pieces to process. Frontload every piece as a pending iteration.
    output: pieces
    gate:
      - check: "npx conductor-board check scope-pieces"
      - "Every piece captured before any work begins"

  - id: raku-firing-loop
    type: loop
    over: pieces
    as: piece
    requires: [scope-pieces]
    steps:
      - id: bisque-load
        instruction: |
          bisque load: bisque, load kiln.
        gate:
          - check: "npx conductor-board check bisque-load"
          - name: "bisque load is correct"
            check: "node verify-unit.mjs bisque-load --out out/bisque-load.json"
      - id: glaze
        instruction: |
          glaze: glaze, apply glaze.
        gate:
          - check: "npx conductor-board check glaze"
          - name: "glaze is correct"
            check: "node verify-unit.mjs glaze --out out/glaze.json"
      - id: reduction-plan
        instruction: |
          reduction plan: reduction, post-fire.
        gate:
          - check: "npx conductor-board check reduction-plan"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: fire-quench
        instruction: |
          fire quench: fire, quench.
        gate:
          - check: "npx conductor-board check fire-quench"
          - name: "fire quench is correct"
            check: "node verify-unit.mjs fire-quench --out out/fire-quench.json"
