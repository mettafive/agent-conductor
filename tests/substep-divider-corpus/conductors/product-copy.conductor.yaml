conductor: 2.0.0
name: product-copy
description: >
  product copy — converted from a skill that names 5 distinct work-units.

steps:
  - id: scope-products
    instruction: |
      Scope the products to process. Frontload every product as a pending iteration.
    output: products
    gate:
      - check: "npx conductor-board check scope-products"
      - "Every product captured before any work begins"

  - id: product-copy-loop
    type: loop
    over: products
    as: product
    requires: [scope-products]
    steps:
      - id: gather-specs
        instruction: |
          gather specs: gather specs, spec sheet.
        gate:
          - check: "npx conductor-board check gather-specs"
          - name: "gather specs is correct"
            check: "node verify-unit.mjs gather-specs --out out/gather-specs.json"
      - id: write-copy
        instruction: |
          write copy: write copy, marketing copy.
        gate:
          - check: "npx conductor-board check write-copy"
          - name: "write copy is correct"
            check: "node verify-unit.mjs write-copy --out out/write-copy.json"
      - id: tone-pass
        instruction: |
          tone pass: tone, brand voice.
        gate:
          - check: "npx conductor-board check tone-pass"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: localize
        instruction: |
          localize: localize, translation, locale.
        gate:
          - check: "npx conductor-board check localize"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: upload
        instruction: |
          upload: upload, save to catalog.
        gate:
          - check: "npx conductor-board check upload"
          - name: "upload is correct"
            check: "node verify-unit.mjs upload --out out/upload.json"
