conductor: 2.0.0
name: sitemap-gen
description: >
  sitemap gen — converted from a skill that names 4 distinct work-units.

steps:
  - id: crawl-site
    instruction: |
      crawl site: crawl site, discover urls.
    gate:
      - check: "npx conductor-board check crawl-site"
      - name: "crawl site is correct"
        check: "node verify-unit.mjs crawl-site --out out/crawl-site.json"
  - id: build-sitemap
    instruction: |
      build sitemap: build sitemap, generate xml.
    requires: [crawl-site]
    gate:
      - check: "npx conductor-board check build-sitemap"
      - name: "build sitemap is correct"
        check: "node verify-unit.mjs build-sitemap --out out/build-sitemap.json"
  - id: priority-weights
    instruction: |
      priority weights: priority, changefreq.
    requires: [build-sitemap]
    gate:
      - check: "npx conductor-board check priority-weights"
      # divider step: no substantive gate — exists purely so the board shows this phase
  - id: submit-sitemap
    instruction: |
      submit sitemap: submit, ping search console.
    requires: [priority-weights]
    gate:
      - check: "npx conductor-board check submit-sitemap"
      - name: "submit sitemap is correct"
        check: "node verify-unit.mjs submit-sitemap --out out/submit-sitemap.json"
