conductor: 2.0.0
name: ad-campaign
description: >
  ad campaign — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-audiences
    instruction: |
      Scope the audiences to process. Frontload every audience as a pending iteration.
    output: audiences
    gate:
      - check: "npx conductor-board check scope-audiences"
      - "Every audience captured before any work begins"

  - id: ad-campaign-loop
    type: loop
    over: audiences
    as: audience
    requires: [scope-audiences]
    steps:
      - id: define-audience
        instruction: |
          define audience: define audience, targeting.
        gate:
          - check: "npx conductor-board check define-audience"
          - name: "define audience is correct"
            check: "node verify-unit.mjs define-audience --out out/define-audience.json"
      - id: write-creative
        instruction: |
          write creative: write creative, ad copy.
        gate:
          - check: "npx conductor-board check write-creative"
          - name: "write creative is correct"
            check: "node verify-unit.mjs write-creative --out out/write-creative.json"
      - id: budget-split
        instruction: |
          budget split: budget, spend allocation.
        gate:
          - check: "npx conductor-board check budget-split"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: launch
        instruction: |
          launch: launch, publish campaign.
        gate:
          - check: "npx conductor-board check launch"
          - name: "launch is correct"
            check: "node verify-unit.mjs launch --out out/launch.json"
