conductor: 2.0.0
name: lead-enrich
description: >
  lead enrich — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-leads
    instruction: |
      Scope the leads to process. Frontload every lead as a pending iteration.
    output: leads
    gate:
      - check: "npx conductor-board check scope-leads"
      - "Every lead captured before any work begins"

  - id: lead-enrich-loop
    type: loop
    over: leads
    as: lead
    requires: [scope-leads]
    steps:
      - id: lookup-company
        instruction: |
          lookup company: lookup, firmographics.
        gate:
          - check: "npx conductor-board check lookup-company"
          - name: "lookup company is correct"
            check: "node verify-unit.mjs lookup-company --out out/lookup-company.json"
      - id: score-lead
        instruction: |
          score lead: score, lead score.
        gate:
          - check: "npx conductor-board check score-lead"
          - name: "score lead is correct"
            check: "node verify-unit.mjs score-lead --out out/score-lead.json"
      - id: intent-signals
        instruction: |
          intent signals: intent signal, buying signal.
        gate:
          - check: "npx conductor-board check intent-signals"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: sync-crm
        instruction: |
          sync crm: sync crm, save to crm.
        gate:
          - check: "npx conductor-board check sync-crm"
          - name: "sync crm is correct"
            check: "node verify-unit.mjs sync-crm --out out/sync-crm.json"
