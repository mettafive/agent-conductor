conductor: 2.0.0
name: dressage-test
description: >
  dressage test — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-movements
    instruction: |
      Scope the movements to process. Frontload every movement as a pending iteration.
    output: movements
    gate:
      - check: "npx conductor-board check scope-movements"
      - "Every movement captured before any work begins"

  - id: dressage-test-loop
    type: loop
    over: movements
    as: movement
    requires: [scope-movements]
    steps:
      - id: read-movement
        instruction: |
          read movement: read movement, test sheet.
        gate:
          - check: "npx conductor-board check read-movement"
          - name: "read movement is correct"
            check: "node verify-unit.mjs read-movement --out out/read-movement.json"
      - id: score-movement
        instruction: |
          score movement: score, mark.
        gate:
          - check: "npx conductor-board check score-movement"
          - name: "score movement is correct"
            check: "node verify-unit.mjs score-movement --out out/score-movement.json"
      - id: collective-marks
        instruction: |
          collective marks: collective marks, impulsion.
        gate:
          - check: "npx conductor-board check collective-marks"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: tally
        instruction: |
          tally: tally, final percentage.
        gate:
          - check: "npx conductor-board check tally"
          - name: "tally is correct"
            check: "node verify-unit.mjs tally --out out/tally.json"
