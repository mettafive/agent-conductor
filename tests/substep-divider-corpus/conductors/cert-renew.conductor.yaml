conductor: 2.0.0
name: cert-renew
description: >
  cert renew — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-domains
    instruction: |
      Scope the domains to process. Frontload every domain as a pending iteration.
    output: domains
    gate:
      - check: "npx conductor-board check scope-domains"
      - "Every domain captured before any work begins"

  - id: cert-renew-loop
    type: loop
    over: domains
    as: domain
    requires: [scope-domains]
    steps:
      - id: check-expiry
        instruction: |
          check expiry: check expiry, expiration.
        gate:
          - check: "npx conductor-board check check-expiry"
          - name: "check expiry is correct"
            check: "node verify-unit.mjs check-expiry --out out/check-expiry.json"
      - id: renew
        instruction: |
          renew: renew, issue cert.
        gate:
          - check: "npx conductor-board check renew"
          - name: "renew is correct"
            check: "node verify-unit.mjs renew --out out/renew.json"
      - id: reload-server
        instruction: |
          reload server: reload, restart nginx.
        gate:
          - check: "npx conductor-board check reload-server"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: verify-chain
        instruction: |
          verify chain: verify chain, ssl check.
        gate:
          - check: "npx conductor-board check verify-chain"
          - name: "verify chain is correct"
            check: "node verify-unit.mjs verify-chain --out out/verify-chain.json"
