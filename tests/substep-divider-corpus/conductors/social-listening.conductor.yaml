conductor: 2.0.0
name: social-listening
description: >
  social listening — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-queries
    instruction: |
      Scope the queries to process. Frontload every query as a pending iteration.
    output: queries
    gate:
      - check: "npx conductor-board check scope-queries"
      - "Every query captured before any work begins"

  - id: social-listening-loop
    type: loop
    over: queries
    as: query
    requires: [scope-queries]
    steps:
      - id: collect-mentions
        instruction: |
          collect mentions: collect mentions, scrape.
        gate:
          - check: "npx conductor-board check collect-mentions"
          - name: "collect mentions is correct"
            check: "node verify-unit.mjs collect-mentions --out out/collect-mentions.json"
      - id: analyze-sentiment
        instruction: |
          analyze sentiment: analyze sentiment, classify.
        gate:
          - check: "npx conductor-board check analyze-sentiment"
          - name: "analyze sentiment is correct"
            check: "node verify-unit.mjs analyze-sentiment --out out/analyze-sentiment.json"
      - id: influencer-flag
        instruction: |
          influencer flag: influencer, high reach.
        gate:
          - check: "npx conductor-board check influencer-flag"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: brief
        instruction: |
          brief: brief, summary report.
        gate:
          - check: "npx conductor-board check brief"
          - name: "brief is correct"
            check: "node verify-unit.mjs brief --out out/brief.json"
