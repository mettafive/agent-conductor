conductor: 2.0.0
name: gdpr-export
description: >
  gdpr export — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-subjects
    instruction: |
      Scope the subjects to process. Frontload every subject as a pending iteration.
    output: subjects
    gate:
      - check: "npx conductor-board check scope-subjects"
      - "Every subject captured before any work begins"

  - id: gdpr-export-loop
    type: loop
    over: subjects
    as: subject
    requires: [scope-subjects]
    steps:
      - id: gather-data
        instruction: |
          gather data: gather data, collect records.
        gate:
          - check: "npx conductor-board check gather-data"
          - name: "gather data is correct"
            check: "node verify-unit.mjs gather-data --out out/gather-data.json"
      - id: redact
        instruction: |
          redact: redact, mask pii.
        gate:
          - check: "npx conductor-board check redact"
          - name: "redact is correct"
            check: "node verify-unit.mjs redact --out out/redact.json"
      - id: format-package
        instruction: |
          format package: format package, machine readable.
        gate:
          - check: "npx conductor-board check format-package"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: deliver
        instruction: |
          deliver: deliver, send export.
        gate:
          - check: "npx conductor-board check deliver"
          - name: "deliver is correct"
            check: "node verify-unit.mjs deliver --out out/deliver.json"
