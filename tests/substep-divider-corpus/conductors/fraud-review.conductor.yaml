conductor: 2.0.0
name: fraud-review
description: >
  fraud review — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-transactions
    instruction: |
      Scope the transactions to process. Frontload every transaction as a pending iteration.
    output: transactions
    gate:
      - check: "npx conductor-board check scope-transactions"
      - "Every transaction captured before any work begins"

  - id: fraud-review-loop
    type: loop
    over: transactions
    as: transaction
    requires: [scope-transactions]
    steps:
      - id: score-transaction
        instruction: |
          score transaction: score, fraud score.
        gate:
          - check: "npx conductor-board check score-transaction"
          - name: "score transaction is correct"
            check: "node verify-unit.mjs score-transaction --out out/score-transaction.json"
      - id: investigate
        instruction: |
          investigate: investigate, review flags.
        gate:
          - check: "npx conductor-board check investigate"
          - name: "investigate is correct"
            check: "node verify-unit.mjs investigate --out out/investigate.json"
      - id: velocity-check
        instruction: |
          velocity check: velocity, rapid transactions.
        gate:
          - check: "npx conductor-board check velocity-check"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: decide-action
        instruction: |
          decide action: decide, block allow.
        gate:
          - check: "npx conductor-board check decide-action"
          - name: "decide action is correct"
            check: "node verify-unit.mjs decide-action --out out/decide-action.json"
