conductor: 2.0.0
name: image-pipeline
description: >
  image pipeline — converted from a skill that names 5 distinct work-units.

steps:
  - id: scope-articles
    instruction: |
      Scope the articles to process. Frontload every article as a pending iteration.
    output: articles
    gate:
      - check: "npx conductor-board check scope-articles"
      - "Every article captured before any work begins"

  - id: image-pipeline-loop
    type: loop
    over: articles
    as: article
    requires: [scope-articles]
    steps:
      - id: prompt-build
        instruction: |
          prompt build: build prompt, image prompt.
        gate:
          - check: "npx conductor-board check prompt-build"
          - name: "prompt build is correct"
            check: "node verify-unit.mjs prompt-build --out out/prompt-build.json"
      - id: generate
        instruction: |
          generate: generate, render image.
        gate:
          - check: "npx conductor-board check generate"
          - name: "generate is correct"
            check: "node verify-unit.mjs generate --out out/generate.json"
      - id: alt-text
        instruction: |
          alt text: alt text, accessibility caption.
        gate:
          - check: "npx conductor-board check alt-text"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: compress
        instruction: |
          compress: compress, optimize size.
        gate:
          - check: "npx conductor-board check compress"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: upload-cdn
        instruction: |
          upload cdn: upload, cdn, storage.
        gate:
          - check: "npx conductor-board check upload-cdn"
          - name: "upload cdn is correct"
            check: "node verify-unit.mjs upload-cdn --out out/upload-cdn.json"
