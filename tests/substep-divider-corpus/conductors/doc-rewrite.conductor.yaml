conductor: 2.0.0
name: doc-rewrite
description: >
  doc rewrite — converted from a skill that names 5 distinct work-units.

steps:
  - id: scope-pages
    instruction: |
      Scope the pages to process. Frontload every page as a pending iteration.
    output: pages
    gate:
      - check: "npx conductor-board check scope-pages"
      - "Every page captured before any work begins"

  - id: doc-rewrite-loop
    type: loop
    over: pages
    as: page
    requires: [scope-pages]
    steps:
      - id: read-current
        instruction: |
          read current: read current, load page.
        gate:
          - check: "npx conductor-board check read-current"
          - name: "read current is correct"
            check: "node verify-unit.mjs read-current --out out/read-current.json"
      - id: rewrite
        instruction: |
          rewrite: rewrite, clarify.
        gate:
          - check: "npx conductor-board check rewrite"
          - name: "rewrite is correct"
            check: "node verify-unit.mjs rewrite --out out/rewrite.json"
      - id: add-examples
        instruction: |
          add examples: code example, add example, snippet.
        gate:
          - check: "npx conductor-board check add-examples"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: add-diagrams
        instruction: |
          add diagrams: diagram, mermaid, figure.
        gate:
          - check: "npx conductor-board check add-diagrams"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: commit
        instruction: |
          commit: commit, push.
        gate:
          - check: "npx conductor-board check commit"
          - name: "commit is correct"
            check: "node verify-unit.mjs commit --out out/commit.json"
