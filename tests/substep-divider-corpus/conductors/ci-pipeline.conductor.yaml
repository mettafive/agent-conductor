conductor: 2.0.0
name: ci-pipeline
description: >
  ci pipeline — converted from a skill that names 6 distinct work-units.

steps:
  - id: install
    instruction: |
      install: install deps, npm ci.
    gate:
      - check: "npx conductor-board check install"
      - name: "install is correct"
        check: "node verify-unit.mjs install --out out/install.json"
  - id: lint
    instruction: |
      lint: lint, eslint.
    requires: [install]
    gate:
      - check: "npx conductor-board check lint"
      - name: "lint is correct"
        check: "node verify-unit.mjs lint --out out/lint.json"
  - id: test
    instruction: |
      test: test, unit tests.
    requires: [lint]
    gate:
      - check: "npx conductor-board check test"
      - name: "test is correct"
        check: "node verify-unit.mjs test --out out/test.json"
  - id: coverage-report
    instruction: |
      coverage report: coverage report, coverage threshold.
    requires: [test]
    gate:
      - check: "npx conductor-board check coverage-report"
      # divider step: no substantive gate — exists purely so the board shows this phase
  - id: build-artifact
    instruction: |
      build artifact: build artifact, bundle.
    requires: [coverage-report]
    gate:
      - check: "npx conductor-board check build-artifact"
      - name: "build artifact is correct"
        check: "node verify-unit.mjs build-artifact --out out/build-artifact.json"
  - id: deploy
    instruction: |
      deploy: deploy, ship.
    requires: [build-artifact]
    gate:
      - check: "npx conductor-board check deploy"
      - name: "deploy is correct"
        check: "node verify-unit.mjs deploy --out out/deploy.json"
