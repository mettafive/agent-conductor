conductor: 2.0.0
name: form-builder
description: >
  form builder — converted from a skill that names 4 distinct work-units.

steps:
  - id: define-fields
    instruction: |
      define fields: define fields, form schema.
    gate:
      - check: "npx conductor-board check define-fields"
      - name: "define fields is correct"
        check: "node verify-unit.mjs define-fields --out out/define-fields.json"
  - id: add-validation
    instruction: |
      add validation: add validation, rules.
    requires: [define-fields]
    gate:
      - check: "npx conductor-board check add-validation"
      - name: "add validation is correct"
        check: "node verify-unit.mjs add-validation --out out/add-validation.json"
  - id: conditional-logic
    instruction: |
      conditional logic: conditional logic, branching.
    requires: [add-validation]
    gate:
      - check: "npx conductor-board check conditional-logic"
      # divider step: no substantive gate — exists purely so the board shows this phase
  - id: publish-form
    instruction: |
      publish form: publish form, deploy.
    requires: [conditional-logic]
    gate:
      - check: "npx conductor-board check publish-form"
      - name: "publish form is correct"
        check: "node verify-unit.mjs publish-form --out out/publish-form.json"
