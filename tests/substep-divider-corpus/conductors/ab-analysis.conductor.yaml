conductor: 2.0.0
name: ab-analysis
description: >
  ab analysis — converted from a skill that names 4 distinct work-units.

steps:
  - id: pull-events
    instruction: |
      pull events: pull events, raw counts.
    gate:
      - check: "npx conductor-board check pull-events"
      - name: "pull events is correct"
        check: "node verify-unit.mjs pull-events --out out/pull-events.json"
  - id: significance
    instruction: |
      significance: significance, p-value.
    requires: [pull-events]
    gate:
      - check: "npx conductor-board check significance"
      - name: "significance is correct"
        check: "node verify-unit.mjs significance --out out/significance.json"
  - id: guardrail-metrics
    instruction: |
      guardrail metrics: guardrail, secondary metric.
    requires: [significance]
    gate:
      - check: "npx conductor-board check guardrail-metrics"
      # divider step: no substantive gate — exists purely so the board shows this phase
  - id: recommend
    instruction: |
      recommend: recommend, ship decision.
    requires: [guardrail-metrics]
    gate:
      - check: "npx conductor-board check recommend"
      - name: "recommend is correct"
        check: "node verify-unit.mjs recommend --out out/recommend.json"
