conductor: 2.0.0
name: price-monitor
description: >
  price monitor — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-products
    instruction: |
      Scope the products to process. Frontload every product as a pending iteration.
    output: products
    gate:
      - check: "npx conductor-board check scope-products"
      - "Every product captured before any work begins"

  - id: price-monitor-loop
    type: loop
    over: products
    as: product
    requires: [scope-products]
    steps:
      - id: fetch-listing
        instruction: |
          fetch listing: fetch listing, live page.
        gate:
          - check: "npx conductor-board check fetch-listing"
          - name: "fetch listing is correct"
            check: "node verify-unit.mjs fetch-listing --out out/fetch-listing.json"
      - id: record-price
        instruction: |
          record price: record price, current price.
        gate:
          - check: "npx conductor-board check record-price"
          - name: "record price is correct"
            check: "node verify-unit.mjs record-price --out out/record-price.json"
      - id: change-flag
        instruction: |
          change flag: change flag, price delta.
        gate:
          - check: "npx conductor-board check change-flag"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: store-history
        instruction: |
          store history: store history, log price.
        gate:
          - check: "npx conductor-board check store-history"
          - name: "store history is correct"
            check: "node verify-unit.mjs store-history --out out/store-history.json"
