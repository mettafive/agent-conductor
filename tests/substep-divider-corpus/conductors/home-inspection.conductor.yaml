conductor: 2.0.0
name: home-inspection
description: >
  home inspection — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-rooms
    instruction: |
      Scope the rooms to process. Frontload every room as a pending iteration.
    output: rooms
    gate:
      - check: "npx conductor-board check scope-rooms"
      - "Every room captured before any work begins"

  - id: home-inspection-loop
    type: loop
    over: rooms
    as: room
    requires: [scope-rooms]
    steps:
      - id: inspect-room
        instruction: |
          inspect room: inspect, walkthrough.
        gate:
          - check: "npx conductor-board check inspect-room"
          - name: "inspect room is correct"
            check: "node verify-unit.mjs inspect-room --out out/inspect-room.json"
      - id: document-issues
        instruction: |
          document issues: document issues, defects.
        gate:
          - check: "npx conductor-board check document-issues"
          - name: "document issues is correct"
            check: "node verify-unit.mjs document-issues --out out/document-issues.json"
      - id: photo-evidence
        instruction: |
          photo evidence: photo evidence, capture.
        gate:
          - check: "npx conductor-board check photo-evidence"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: compile-report
        instruction: |
          compile report: compile report, summary.
        gate:
          - check: "npx conductor-board check compile-report"
          - name: "compile report is correct"
            check: "node verify-unit.mjs compile-report --out out/compile-report.json"
