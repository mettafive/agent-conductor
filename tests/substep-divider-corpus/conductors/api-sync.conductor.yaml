conductor: 2.0.0
name: api-sync
description: >
  api sync — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-records
    instruction: |
      Scope the records to process. Frontload every record as a pending iteration.
    output: records
    gate:
      - check: "npx conductor-board check scope-records"
      - "Every record captured before any work begins"

  - id: api-sync-loop
    type: loop
    over: records
    as: record
    requires: [scope-records]
    steps:
      - id: fetch-local
        instruction: |
          fetch local: fetch local, load desired.
        gate:
          - check: "npx conductor-board check fetch-local"
          - name: "fetch local is correct"
            check: "node verify-unit.mjs fetch-local --out out/fetch-local.json"
      - id: push-remote
        instruction: |
          push remote: push, sync to api.
        gate:
          - check: "npx conductor-board check push-remote"
          - name: "push remote is correct"
            check: "node verify-unit.mjs push-remote --out out/push-remote.json"
      - id: rate-limit
        instruction: |
          rate limit: rate limit, throttle, backoff.
        gate:
          - check: "npx conductor-board check rate-limit"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: readback
        instruction: |
          readback: read back, verify remote.
        gate:
          - check: "npx conductor-board check readback"
          - name: "readback is correct"
            check: "node verify-unit.mjs readback --out out/readback.json"
