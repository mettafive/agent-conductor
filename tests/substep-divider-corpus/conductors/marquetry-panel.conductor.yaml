conductor: 2.0.0
name: marquetry-panel
description: >
  marquetry panel — converted from a skill that names 4 distinct work-units.

steps:
  - id: scope-panels
    instruction: |
      Scope the panels to process. Frontload every panel as a pending iteration.
    output: panels
    gate:
      - check: "npx conductor-board check scope-panels"
      - "Every panel captured before any work begins"

  - id: marquetry-panel-loop
    type: loop
    over: panels
    as: panel
    requires: [scope-panels]
    steps:
      - id: cut-veneer
        instruction: |
          cut veneer: cut veneer, fret saw.
        gate:
          - check: "npx conductor-board check cut-veneer"
          - name: "cut veneer is correct"
            check: "node verify-unit.mjs cut-veneer --out out/cut-veneer.json"
      - id: assemble-pattern
        instruction: |
          assemble pattern: assemble, fit pieces.
        gate:
          - check: "npx conductor-board check assemble-pattern"
          - name: "assemble pattern is correct"
            check: "node verify-unit.mjs assemble-pattern --out out/assemble-pattern.json"
      - id: sand-shade
        instruction: |
          sand shade: sand shade, hot sand.
        gate:
          - check: "npx conductor-board check sand-shade"
          # divider step: no substantive gate — exists purely so the board shows this phase
      - id: glue-press
        instruction: |
          glue press: glue, press panel.
        gate:
          - check: "npx conductor-board check glue-press"
          - name: "glue press is correct"
            check: "node verify-unit.mjs glue-press --out out/glue-press.json"
